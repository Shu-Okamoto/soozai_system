services:
  - type: web
    name: sozai-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: sozai-db
      mountPath: /data
      sizeGB: 1

  - type: cron
    name: finalize-daily-reports
    env: python
    schedule: "0 18 * * *"   # 03:00 JST = 18:00 UTC (毎日)
    buildCommand: pip install -r requirements.txt
    startCommand: python finalize_pending.py
