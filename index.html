      <div class="no-print" style="margin-bottom:12px">${catTabs}</div>
      <div id="order-material-body"></div>
      <div class="no-print" style="margin-top:16px;display:flex;justify-content:flex-end">
        <button class="btn btn-primary" onclick="saveMaterialOrders()">💾 在庫を保存して発注数を確定</button>
      </div>
    </div>`;
  renderOrderMaterialBody();
}

function selectOrderCategory(cat) {
  // タブ切替前に入力中の在庫を控えておく（保存前でも保持・再フェッチしない）
  captureStockInputs();
  materialOrderState.category = cat;
  drawMaterialOrderPage();
}

// 画面上の在庫入力値を materialOrderState.saved に反映（タブ移動・再描画で消えないように）
function captureStockInputs() {
  document.querySelectorAll('.mo-stock').forEach(inp => {
    const pid = +inp.dataset.pid;
    const v = inp.value === '' ? undefined : (parseInt(inp.value)||0);
    if (v === undefined) delete materialOrderState.saved[pid];
    else materialOrderState.saved[pid] = v;
  });
}

function renderOrderMaterialBody() {
  const { category, products, suppliers, saved } = materialOrderState;
  const inCat = products.filter(p => (p.category||'未分類') === category);
  // 業者ごとにグループ化
  const groups = {};
  inCat.forEach(p => {
    const key = p.supplier_id || 0;
    (groups[key] = groups[key] || []).push(p);
  });
  const blocks = Object.keys(groups).map(sidKey => {
    const s = suppliers[sidKey];
    const head = s ? `
      <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:baseline">
        <span style="font-weight:700;font-size:15px">🚚 ${s.name}</span>
        ${s.order_days?`<span style="font-size:12px;color:var(--text2)">発注: ${s.order_days}</span>`:''}
        ${s.delivery_days?`<span style="font-size:12px;color:var(--text2)">納品: ${s.delivery_days}</span>`:''}
        ${s.phone?`<span style="font-size:12px;color:var(--text2)">☎ ${s.phone}</span>`:''}
        ${s.site_url?`<a href="${s.site_url}" target="_blank" rel="noopener" style="font-size:12px">サイト↗</a>`:''}
      </div>` : `<span style="font-weight:700;font-size:15px;color:var(--text2)">業者未設定</span>`;
    const rows = groups[sidKey].map(p => {
      const stock = saved[p.id];
      const stockVal = (stock===undefined||stock===null) ? '' : stock;
      const oq = (stock===undefined||stock==='') ? '' : calcOrderQty(p.base_qty, stock, p.order_unit);
      return `
        <tr>
          <td style="text-align:left">${p.name}</td>
          <td style="text-align:center">${p.base_qty||0}</td>
          <td style="text-align:center">${p.order_unit?p.order_unit:'―'}</td>
          <td><input type="number" min="0" class="mo-stock" data-pid="${p.id}" data-base="${p.base_qty||0}" data-unit="${p.order_unit||0}"
                value="${stockVal}" placeholder="0" oninput="onStockInput(this)"
                style="width:72px;text-align:center"></td>
          <td style="text-align:center;font-weight:700"><span class="mo-order" data-pid="${p.id}">${oq}</span></td>
          <td style="text-align:right;color:var(--text2)">${p.price?('¥'+p.price.toLocaleString()):'―'}</td>
        </tr>`;
    }).join('');
    return `
      <div class="card mb-16">
        <div class="card-header">${head}</div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="text-align:left;min-width:140px">商品名</th>
              <th style="min-width:56px">基準数</th>
              <th style="min-width:48px">単位</th>
              <th style="min-width:80px">在庫数</th>
              <th style="min-width:70px">発注数</th>
              <th style="min-width:70px">価格</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');
  document.getElementById('order-material-body').innerHTML =
    blocks || '<div class="text-muted text-center" style="padding:24px">このカテゴリの発注商品はありません</div>';
}

function onStockInput(inp) {
  const base = +inp.dataset.base, unit = +inp.dataset.unit;
  const stock = inp.value === '' ? '' : (parseInt(inp.value)||0);
  const span = document.querySelector(`.mo-order[data-pid="${inp.dataset.pid}"]`);
  if (span) span.textContent = (stock==='') ? '' : calcOrderQty(base, stock, unit);
}

async function saveMaterialOrders() {
  captureStockInputs();
  const items = Object.entries(materialOrderState.saved)
    .map(([pid, stock]) => ({order_product_id:+pid, stock_qty:stock}));
  const r = await fetch(`${API}/material-orders/bulk`, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({date: materialOrderState.date, items})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) showToast(`${r.count}件保存しました`);
  else showToast('保存失敗', true);
}

let checklistMode = 'daily'; // 'daily' | 'monthly'

function checklistDef(mode){ return mode === 'monthly' ? CHECKLIST_MONTHLY : CHECKLIST_DAILY; }
function checklistPeriodKey(mode){ return mode === 'monthly' ? currentDate.slice(0,7) : currentDate; }

function switchChecklist(mode){ checklistMode = mode; renderChecklistPage(); }

async function renderChecklistPage() {
  setLoading();
  const mode       = checklistMode;
  const periodKey  = checklistPeriodKey(mode);
  const records    = await fetch(`${API}/checklist?period_type=${mode}&period_key=${periodKey}`).then(r=>r.json()).catch(()=>[]);
  const checkedSet = new Set((records||[]).map(r=>r.item_key));
  const lastBy     = (records||[]).map(r=>r.checked_by).find(x=>x) || '';

  const groups = checklistDef(mode).map(g=>{
    const items = g.items.map(it=>`
      <label style="display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer">
        <input type="checkbox" id="chk_${it.key}" ${checkedSet.has(it.key)?'checked':''}
               style="width:20px;height:20px;margin-top:1px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)">
        <span style="font-size:14px;line-height:1.5">${it.label}</span>
      </label>`).join('');
    return `<div class="card mb-16">
        <div class="card-header"><span class="card-title">${g.cat}</span></div>
        <div>${items}</div>
      </div>`;
  }).join('');

  const memberOpts = ['<option value="">― 記入者を選択 ―</option>']
    .concat(cachedMembers.map(m=>`<option value="${m.name}" ${m.name===lastBy?'selected':''}>${m.name}</option>`))
    .join('');

  const dateLabel = mode==='monthly'
    ? `${periodKey.slice(0,4)}年${periodKey.slice(5,7)}月`
    : periodKey;

  document.getElementById('content').innerHTML = `
    <div style="max-width:820px;margin:0 auto">
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn ${mode==='daily'  ?'btn-primary':'btn-secondary'}" onclick="switchChecklist('daily')">📅 日々のチェックリスト</button>
        <button class="btn ${mode==='monthly'?'btn-primary':'btn-secondary'}" onclick="switchChecklist('monthly')">🗓 月のチェックリスト</button>
      </div>
      <div class="card mb-16">
        <div class="card-body" style="display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between">
          <div style="font-size:14px;color:var(--text2)">
            対象：<strong style="color:var(--text)">${dateLabel}</strong>
            <span style="margin-left:8px">（${mode==='daily'?'日次':'月次'}の衛生管理）</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <label style="font-size:13px;color:var(--text2)">記入者</label>
            <select id="checklist-by" style="min-width:150px">${memberOpts}</select>
          </div>
        </div>
      </div>
      ${groups}
      <div style="display:flex;justify-content:flex-end;margin:8px 0 40px">
        <button class="btn btn-primary" style="padding:10px 28px" onclick="saveChecklist()">💾 保存</button>
      </div>
    </div>`;
}

async function saveChecklist(){
  const mode = checklistMode;
  const by   = document.getElementById('checklist-by').value;
  if (!by){ showToast('記入者を選択してください', true); return; }
  const items = checklistDef(mode).flatMap(g=>g.items).map(it=>({
    item_key: it.key,
    checked:  document.getElementById('chk_'+it.key).checked
  }));
  const r = await fetch(`${API}/checklist`, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({period_type:mode, period_key:checklistPeriodKey(mode), checked_by:by, items})
  }).then(r=>r.json()).catch(()=>null);
  if (r?.ok) showToast('保存しました'); else showToast('保存失敗', true);
}

function buildProdRow(p) {
  const subcats = getSubcats(p.category);
  const subcatSel = subcats.length
    ? `<select id="ps${p.id}" style="width:80px;font-size:12px">
        <option value="">―</option>
        ${subcats.map(s=>`<option value="${s}"${p.subcategory===s?' selected':''}>${s}</option>`).join('')}
       </select>`
    : `<span style="color:var(--text3)">―</span>`;
  const isActive = p.active !== 0;
  const rowStyle = isActive ? '' : 'background:#FAFAFA;opacity:0.65';
  const statusBadge = isActive
    ? `<span style="background:#E8F5E9;color:#2E7D32;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">有効</span>`
    : `<span style="background:#EEEEEE;color:#757575;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">無効</span>`;
  const toggleBtn = isActive
    ? `<button class="btn btn-secondary btn-sm" style="margin-left:4px;color:var(--danger)" onclick="setProductActive(${p.id},0)">無効化</button>`
    : `<button class="btn btn-secondary btn-sm" style="margin-left:4px;color:#2E7D32" onclick="setProductActive(${p.id},1)">有効化</button>`;
  const ptypeCell = deptFeatures().production
    ? `<td><select id="ptype${p.id}" style="width:90px;font-size:12px">
        <option value="manufacture"${p.prod_type!=='consignment'?' selected':''}>自社製造</option>
        <option value="consignment"${p.prod_type==='consignment'?' selected':''}>製造委託</option>
       </select></td>`
    : '';
  return `<tr style="${rowStyle}">
    <td class="left"><input type="text" value="${p.name}" id="pn${p.id}" style="width:150px"></td>
    <td><input type="number" value="${p.price}" id="pp${p.id}" style="width:75px"></td>
    <td><select id="pc${p.id}" style="width:70px" onchange="toggleSubcatCell(${p.id},this.value)">
      ${getCatOrder().map(c=>`<option${c===p.category?' selected':''}>${c}</option>`).join('')}
    </select></td>
    <td id="psc${p.id}">${subcatSel}</td>
    ${ptypeCell}
    <td class="text-center">${statusBadge}</td>
    <td>
      <button class="btn btn-primary btn-sm" onclick="updateProduct(${p.id})">更新</button>
      ${toggleBtn}
    </td>
  </tr>`;
}

async function renderMasterPage() {
  setLoading();
  const prods = await fetch(`${API}/products?include_inactive=1`).then(r=>r.json()).catch(()=>[]);
  const activeCount   = prods.filter(p=>p.active!==0).length;
  const inactiveCount = prods.length - activeCount;

  const isPickles = !!deptFeatures().production;
  const COLS = isPickles ? 7 : 6;
  const catOrder = getCatOrder();
  let rows = '';
  catOrder.forEach(cat => {
    const catProds = prods.filter(p=>p.category===cat);
    if (!catProds.length) return;
    rows += `<tr><td colspan="${COLS}" class="fw-bold" style="background:var(--accent-light);color:var(--accent);font-size:11px;padding:4px 10px;text-align:left">▶ ${cat}</td></tr>`;
    const subcats = getSubcats(cat);
    if (subcats.length) {
      subcats.forEach(sub => {
        const subProds = catProds.filter(p=>p.subcategory===sub);
        if (!subProds.length) return;
        rows += `<tr><td colspan="${COLS}" style="background:var(--surface2);font-size:11px;padding:3px 10px 3px 22px;color:var(--text2)">└ ${sub}</td></tr>`;
        rows += subProds.map(p=>buildProdRow(p)).join('');
      });
      const noSub = catProds.filter(p=>!p.subcategory);
      if (noSub.length) {
        rows += `<tr><td colspan="${COLS}" style="background:var(--surface2);font-size:11px;padding:3px 10px 3px 22px;color:var(--text2)">└ 未分類</td></tr>`;
        rows += noSub.map(p=>buildProdRow(p)).join('');
      }
    } else {
      rows += catProds.map(p=>buildProdRow(p)).join('');
    }
  });

  document.getElementById('content').innerHTML = `
    <div class="card mb-16">
      <div class="card-header">
        <span class="card-title">商品マスタ</span>
        <span class="text-muted" style="font-size:12px">有効${activeCount}件 / 無効${inactiveCount}件　※無効商品は実績入力・献立等のセレクトに表示されません</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="text-align:left;min-width:150px">品名</th>
            <th style="min-width:80px">価格（円）</th>
            <th style="min-width:75px">分類</th>
            <th style="min-width:85px">惣菜種別</th>
            ${isPickles?'<th style="min-width:90px">製造区分</th>':''}
            <th style="min-width:60px">状態</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">商品を追加</span></div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-group"><label>品名</label><input type="text" id="new-pn" placeholder="からあげ弁当"></div>
          <div class="form-group"><label>価格（円）</label><input type="number" id="new-pp" placeholder="450"></div>
          <div class="form-group"><label>分類・種別</label>
            <select id="new-cat">
              <option value="">― 選択してください ―</option>
              ${getCatOrder().map(cat => {
                const subs = getSubcats(cat);
                if (subs.length) {
                  return `<optgroup label="${cat}">${subs.map(s=>`<option value="${cat}|${s}">${s}</option>`).join('')}</optgroup>`;
                }
                return `<optgroup label="${cat}"><option value="${cat}|">${cat}</option></optgroup>`;
              }).join('')}
            </select>
          </div>
          ${isPickles?`<div class="form-group"><label>製造区分</label>
            <select id="new-ptype">
              <option value="manufacture">自社製造</option>
              <option value="consignment">製造委託</option>
            </select></div>`:''}
        </div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="addProduct()">＋ 追加</button>
      </div>
    </div>
  `;
}


function toggleSubcatCell(id, catVal) {
  const cell = document.getElementById('psc'+id);
  if (!cell) return;
  const subcats = getSubcats(catVal);
  if (subcats.length) {
    cell.innerHTML = `<select id="ps${id}" style="width:80px;font-size:12px">
      <option value="">―</option>
      ${subcats.map(s=>`<option value="${s}">${s}</option>`).join('')}
    </select>`;
  } else {
    cell.innerHTML = '<span style="color:var(--text3)">―</span>';
  }
}

async function updateProduct(id) {
  const name     = document.getElementById('pn'+id).value.trim();
  const price    = parseInt(document.getElementById('pp'+id).value)||0;
  const category = document.getElementById('pc'+id).value;
  const subcategory = document.getElementById('ps'+id)?.value || '';
  const body = {name,price,category,subcategory,active:1};
  const ptype = document.getElementById('ptype'+id);
  if (ptype) body.prod_type = ptype.value;
  const r = await fetch(`${API}/products/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast('更新しました'); cachedProducts=await fetch(API+'/products').then(r=>r.json()); }
  else showToast('更新失敗',true);
}

async function setProductActive(id, active) {
  if (active===0 && !confirm('この商品を無効化しますか？\n（実績入力・献立等のセレクトに表示されなくなります。過去データには影響しません）')) return;
  const name        = document.getElementById('pn'+id).value.trim();
  const price       = parseInt(document.getElementById('pp'+id).value)||0;
  const category    = document.getElementById('pc'+id).value;
  const subcategory = document.getElementById('ps'+id)?.value || '';
  const r = await fetch(`${API}/products/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,price,category,subcategory,active})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) {
    showToast(active===1 ? '有効化しました' : '無効化しました');
    cachedProducts = await fetch(API+'/products').then(r=>r.json());
    renderMasterPage();
  } else showToast('更新失敗',true);
}

async function addProduct() {
  const name     = document.getElementById('new-pn').value.trim();
  const price    = parseInt(document.getElementById('new-pp').value)||0;
  const catVal = document.getElementById('new-cat').value;
  if (!name)   { showToast('品名を入力してください',true); return; }
  if (!catVal) { showToast('分類・種別を選択してください',true); return; }
  const [category, subcategory] = catVal.split('|');
  const body = {name,price,category,subcategory};
  const ptype = document.getElementById('new-ptype');
  if (ptype) body.prod_type = ptype.value;
  const r = await fetch(`${API}/products`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast('追加しました'); cachedProducts=await fetch(API+'/products').then(r=>r.json()); renderMasterPage(); }
  else showToast('追加失敗',true);
}

async function reloadCategoryCaches() {
  [cachedCategories, cachedSubcategories] = await Promise.all([
    fetch(API+'/categories').then(r=>r.json()).catch(()=>[]),
    fetch(API+'/subcategories').then(r=>r.json()).catch(()=>[])
  ]);
}

  setLoading();
  await reloadCategoryCaches();

  const catRows = cats.map(c => {

        <td><input type="number" value="${s.sort_order}" id="so${s.id}" style="width:56px;text-align:center" min="1"></td>

          <button class="btn btn-secondary btn-sm" style="margin-left:4px;color:var(--danger)" onclick="deleteSubcategory(${s.id},'${s.name.replace(/'/g,"\\'")}')">削除</button>
        </td>

      <tr style="background:var(--accent-light)">

        <td><input type="number" value="${c.sort_order}" id="co${c.id}" style="width:56px;text-align:center" min="1"></td>

          <button class="btn btn-primary btn-sm" onclick="updateCategory(${c.id})">更新</button>
          <button class="btn btn-secondary btn-sm" style="margin-left:4px;color:var(--danger)" onclick="deleteCategory(${c.id},'${c.name.replace(/'/g,"\\'")}')">削除</button>
        </td>
      </tr>
      ${subRows}
      <tr>
        <td colspan="3" style="padding:4px 4px 12px 24px;background:#FAFAFA">
          <input type="text" id="newsn${c.id}" placeholder="新しいサブカテゴリ名" style="width:160px;font-size:13px">
          <button class="btn btn-secondary btn-sm" style="margin-left:6px" onclick="addSubcategory(${c.id})">＋ サブカテゴリ追加</button>
        </td>
      </tr>`;
  }).join('');

  const catOptions = cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="alert alert-warn no-print" style="margin-bottom:16px">
      ⚠️ カテゴリ名・サブカテゴリ名を変更すると、その名前を使用中の全商品も自動でリネームされます。<br>
      使用中のカテゴリ／サブカテゴリは削除できません（先に商品を別カテゴリに移動してください）。
    </div>
    <div class="card mb-16">
      <div class="card-header">
        <span class="card-title">カテゴリ・サブカテゴリ一覧</span>
        <span class="text-muted" style="font-size:12px">カテゴリ${cats.length}件 / サブカテゴリ${subs.length}件</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="text-align:left;min-width:160px">名前</th>
            <th style="min-width:60px">ソート順</th>
            <th></th>
          </tr></thead>
          <tbody>${catRows||'<tr><td colspan="3" class="text-muted text-center" style="padding:20px">カテゴリが登録されていません</td></tr>'}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">カテゴリを追加</span></div>
      <div class="card-body">
        <div class="form-grid" style="grid-template-columns:1fr auto;gap:12px;align-items:end">

async function addCategory() {
  const name = document.getElementById('new-cat').value.trim();
  if (!name) { showToast('カテゴリ名を入力してください', true); return; }
  const r = await fetch(`${API}/categories`, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast('追加しました'); renderCategoriesPage(); }
  else showToast(r?.error || '追加失敗', true);
}

async function updateCategory(id) {
  const name  = document.getElementById('cn'+id).value.trim();
  const order = parseInt(document.getElementById('co'+id).value) || 1;
  if (!name) { showToast('カテゴリ名を入力してください', true); return; }
  const r = await fetch(`${API}/categories/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, sort_order: order, active: 1})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) {
    showToast('更新しました');
    await reloadCategoryCaches();
    cachedProducts = await fetch(API+'/products').then(r=>r.json());
    renderCategoriesPage();
  } else showToast(r?.error || '更新失敗', true);
}

async function deleteCategory(id, name) {
  if (!confirm(`カテゴリ「${name}」を削除しますか？\n配下のサブカテゴリも同時に削除されます。`)) return;
  const r = await fetch(`${API}/categories/${id}`, {method:'DELETE'}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast('削除しました'); renderCategoriesPage(); }
  else showToast(r?.error || '削除失敗', true);
}

function channelExtraFields(suffix) {
  const g = id => document.getElementById(id+suffix);
  const out = {};
  if (g('cct'))  out.ctype   = g('cct').value;
  if (g('ccn'))  out.contact = g('ccn').value.trim();
  if (g('cph'))  out.phone   = g('cph').value.trim();
  if (g('cfx'))  out.fax     = g('cfx').value.trim();
  if (g('cem'))  out.email   = g('cem').value.trim();
  if (g('czp'))  out.zip     = g('czp').value.trim();
  if (g('cad'))  out.address = g('cad').value.trim();
  return out;
}

async function addChannel() {
  const name = document.getElementById('new-chn').value.trim();
  if (!name) { showToast('出荷先名を入力してください', true); return; }
  const r = await fetch(`${API}/channels`, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, ...channelExtraFields('New')})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) {
    showToast('追加しました');
    cachedChannels = await fetch(API+'/channels').then(r=>r.json());
    renderChannelsPage();
  } else showToast('追加失敗（同名の出荷先が既にある可能性があります）', true);
}

async function updateChannel(id) {
  const name  = document.getElementById('chn'+id).value.trim();
  const order = parseInt(document.getElementById('cho'+id).value) || 1;
  if (!name) { showToast('出荷先名を入力してください', true); return; }
  const r = await fetch(`${API}/channels/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, sort_order: order, active: 1, ...channelExtraFields(String(id))})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) {
    showToast('更新しました');
    cachedChannels = await fetch(API+'/channels').then(r=>r.json());
  } else showToast('更新失敗', true);
}

async function deleteChannel(id, name) {
  if (!confirm(`「${name}」を削除しますか？\n過去の出荷データが残っている場合、集計に影響します。`)) return;
  const order = parseInt(document.getElementById('cho'+id).value) || 1;
  const r = await fetch(`${API}/channels/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, sort_order: order, active: 0})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) {
    showToast('削除しました');
    cachedChannels = await fetch(API+'/channels').then(r=>r.json());
    renderChannelsPage();
  } else showToast('削除失敗', true);
}

// 漬物部：製造 → 在庫 → 出荷 → 請求
// ═══════════════════════════════════════════════
// ── 製造日報：自社製造／委託入庫の数量＋時間数・天気を入力し、
//    「確定」で在庫反映＋売上日報生成（製造高＝自社製造数×単価）。確定後も修正可。
async function renderProductionPage() {
  setLoading();
  const date = currentDate;
  const [manu, cons, shifts, report] = await Promise.all([
    fetch(`${API}/production?date=${date}&kind=manufacture`).then(r=>r.json()).catch(()=>[]),
    fetch(`${API}/production?date=${date}&kind=consignment`).then(r=>r.json()).catch(()=>[]),
    fetch(`${API}/shifts?date=${date}`).then(r=>r.json()).catch(()=>[]),
    fetch(`${API}/daily-reports/${date}`).then(r=>r.json()).catch(()=>({})),
  ]);
  window._prodExpense = (report && report.expense != null) ? report.expense : null;  // 確定済みなら経費(営業日按分)を反映
  const manuMap = {}; manu.forEach(r=>manuMap[r.product_id]=r.qty);
  const consMap = {}; cons.forEach(r=>consMap[r.product_id]=r.qty);
  const shiftMap = {}; shifts.forEach(s=>shiftMap[s.member_name]=s.hours);
  const products = (cachedProducts||[]).filter(p=>p.active);
  const members  = (cachedMembers||[]).filter(m=>m.active);
  // 商品マスタの製造区分で振り分け（自社製造／製造委託）
  const manuProds = products.filter(p=>p.prod_type!=='consignment');
  const consProds = products.filter(p=>p.prod_type==='consignment');

  const manuRows = manuProds.map(p=>`
    <tr>
      <td style="text-align:left">${esc(p.name)}</td>
      <td style="text-align:right;color:var(--text2)">¥${fmt(p.price||0)}</td>
      <td><input type="number" min="0" class="manu-qty" data-pid="${p.id}" data-price="${p.price||0}"
            value="${manuMap[p.id]!=null?manuMap[p.id]:''}" placeholder="0" style="width:74px;text-align:center" oninput="recalcProdReport()"></td>
      <td style="text-align:right"><span class="manu-amt" data-pid="${p.id}">¥0</span></td>
    </tr>`).join('');
  const consRows = consProds.map(p=>`
    <tr>
      <td style="text-align:left">${esc(p.name)}</td>
      <td><input type="number" min="0" class="cons-qty" data-pid="${p.id}"
            value="${consMap[p.id]!=null?consMap[p.id]:''}" placeholder="0" style="width:74px;text-align:center"></td>
    </tr>`).join('');
  const memberInputs = members.map(m=>`
    <div style="display:flex;align-items:center;gap:6px">
      <span style="min-width:80px;font-size:13px">${esc(m.name)}</span>
      <input type="number" min="0" max="24" step="0.5" class="prod-hours" data-name="${esc(m.name)}"
        value="${shiftMap[m.name]!=null?shiftMap[m.name]:''}" placeholder="0" style="width:64px;text-align:center" oninput="recalcProdReport()">
      <span style="font-size:12px;color:var(--text2)">時間</span>
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div style="max-width:900px;margin:0 auto">
      <div class="no-print" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
        <label style="font-size:13px;color:var(--text2)">製造日</label>
        <input type="date" value="${date}" onchange="currentDate=this.value;document.getElementById('global-date').value=this.value;renderProductionPage()"
          style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit">
        ${report&&report.finalized_at?'<span style="font-size:12px;color:var(--text2)">（確定済・修正可）</span>':''}
      </div>

// 入力値からクライアント側で売上日報をプレビュー計算（確定時はサーバーが再計算）
function recalcProdReport() {
  const rate = (currentDeptObj?.config?.material_rate) ?? 0.5;
  let sales = 0;
  document.querySelectorAll('.manu-qty').forEach(inp=>{
    const qty = parseInt(inp.value)||0, price = +inp.dataset.price||0;
    const amt = qty*price;
    const span = document.querySelector(`.manu-amt[data-pid="${inp.dataset.pid}"]`);
    if (span) span.textContent = '¥'+fmt(amt);
    sales += amt;
  });
  let hours = 0, labor = 0;
  const wageMap = {}; (cachedMembers||[]).forEach(m=>wageMap[m.name]=m.hourly_wage||0);
  document.querySelectorAll('.prod-hours').forEach(inp=>{
    const h = parseFloat(inp.value)||0;
    hours += h; labor += Math.round(h*(wageMap[inp.dataset.name]||0));
  });
  const material = Math.round(sales*rate);
  const exp = window._prodExpense;                 // 確定済み＝サーバー計算の経費。未確定＝null
  const hasExp = exp != null;
  const profit = sales - material - labor - (hasExp ? exp : 0);
  const kpi = document.getElementById('prod-kpi');
  if (kpi) kpi.innerHTML = `
    <div class="kpi"><div class="kpi-label">製造高（売上）</div><div class="kpi-value green">¥${fmt(sales)}</div></div>
    <div class="kpi"><div class="kpi-label">材料費(${Math.round(rate*100)}%)</div><div class="kpi-value">¥${fmt(material)}</div></div>
    <div class="kpi"><div class="kpi-label">人件費</div><div class="kpi-value">¥${fmt(labor)}</div></div>
    <div class="kpi"><div class="kpi-label">経費</div><div class="kpi-value">${hasExp?'¥'+fmt(exp):'<span style=\"font-size:13px;color:var(--text2)\">確定で算出</span>'}</div></div>
    <div class="kpi"><div class="kpi-label">総時間</div><div class="kpi-value">${hours}<span style="font-size:13px">h</span></div></div>
    <div class="kpi"><div class="kpi-label">差引利益${hasExp?'':'(経費前)'}</div><div class="kpi-value ${profit>=0?'green':'red'}">¥${fmt(profit)}</div></div>`;
}

async function saveProductionReport() {
  const date = currentDate;
  const manuItems = [...document.querySelectorAll('.manu-qty')].map(i=>({product_id:+i.dataset.pid, qty:i.value===''?0:(parseInt(i.value)||0)}));
  const consItems = [...document.querySelectorAll('.cons-qty')].map(i=>({product_id:+i.dataset.pid, qty:i.value===''?0:(parseInt(i.value)||0)}));
  const shiftRows = [...document.querySelectorAll('.prod-hours')].map(i=>({member_name:i.dataset.name, hours:parseFloat(i.value)||0}));
  const weather = document.getElementById('prod-weather').value;
  const note = document.getElementById('prod-note').value;
  try {
    // 1) 製造・委託入庫を保存（＝在庫反映） 2) 勤務時間を保存 3) 売上日報を生成
    await fetch(`${API}/production/bulk`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({date, kind:'manufacture', items:manuItems})});
    await fetch(`${API}/production/bulk`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({date, kind:'consignment', items:consItems})});
    await fetch(`${API}/shifts`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({date, shifts:shiftRows})});
    // 天気・メモを先に保存（generate は既存メモを保持するため）
    await fetch(`${API}/daily-info/${date}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({weather, note})});
    const r = await fetch(`${API}/daily-reports/${date}/generate`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({weather, note})}).then(r=>r.json());
    if (r?.ok) { showToast('確定しました（在庫・売上日報に反映）'); renderProductionPage(); }
    else showToast(r?.error==='finalized'?'確定済のため再生成できません':'確定失敗', true);
  } catch(e) { showToast('確定失敗', true); }
}

            <thead><tr><th style="text-align:left;min-width:180px">商品</th><th style="min-width:90px">数量</th><th style="min-width:100px">単価</th><th>金額</th><th class="no-print"></th></tr></thead>
            <tbody id="sh-rows"></tbody>
          </table></div>
          <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
            <button class="btn btn-secondary btn-sm" onclick="addShipRow()">＋ 商品行を追加</button>
            <button class="btn btn-primary" onclick="submitShipments()">登録</button>
          </div>
          <div id="sh-warn" style="margin-top:8px;font-size:13px;color:var(--danger)"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header" style="flex-wrap:wrap;gap:8px">
          <span class="card-title">${month} の出荷</span>
          <div class="no-print" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--text2)">表示:</span>
            <button class="btn btn-sm" id="shf-all"        onclick="setShipFilter('all')">すべて</button>
            <button class="btn btn-sm" id="shf-registered" onclick="setShipFilter('registered')">登録済のみ</button>
            <button class="btn btn-sm" id="shf-shipped"    onclick="setShipFilter('shipped')">出荷済のみ</button>
            <span style="font-size:12px;color:var(--text2);margin-left:8px">並び:</span>
            <button class="btn btn-sm" id="shs-delivery" onclick="setShipSort('delivery')">納品予定が近い順</button>
            <button class="btn btn-sm" id="shs-order"    onclick="setShipSort('order')">登録日が新しい順</button>
            <span id="ship-bulk-actions" class="no-print" style="display:flex;gap:8px;align-items:center;margin-left:8px"></span>
          </div>
        </div>
        <div class="table-wrap"><table>
          <thead><tr>
            <th>登録日</th><th>納品予定</th><th style="text-align:left">請求先</th><th style="text-align:left">納品先</th><th style="text-align:left">商品</th>
            <th>数量</th><th>単価</th><th>金額</th><th>状態</th><th class="no-print"></th>
          </tr></thead>
          <tbody id="ship-list-body"></tbody>
        </table></div>
      </div>
    </div>`;
  shipmentPriceMap = {}; shipDestMap = {};
  addShipRow(); addShipRow();   // 初期2行
  drawShipmentList();
}

let shipFilter = 'registered'; // 既定は登録済のみ。'all' | 'registered' | 'shipped'
let shipSort   = 'delivery';   // 'delivery'(納品予定が近い順) | 'order'(登録日が新しい順)
let shipGroups = {};           // groupKey -> [shipment ids]（登録済のまとめ出荷用）

function setShipFilter(f) { shipFilter = f; drawShipmentList(); }
function setShipSort(s)   { shipSort = s;   drawShipmentList(); }

function drawShipmentList() {
  const all = window._shipList || [];
  const prodName = {}; (cachedProducts||[]).forEach(p=>prodName[p.id]=p.name);
  const chName = {}; (cachedChannels||[]).forEach(c=>chName[c.id]=c.name);
  // フィルタ／並びボタンの選択状態
  [['shf-all','all'],['shf-registered','registered'],['shf-shipped','shipped']].forEach(([id,v])=>{
    const b=document.getElementById(id); if(b) b.className='btn btn-sm '+(shipFilter===v?'btn-primary':'btn-secondary');});
  [['shs-delivery','delivery'],['shs-order','order']].forEach(([id,v])=>{
    const b=document.getElementById(id); if(b) b.className='btn btn-sm '+(shipSort===v?'btn-primary':'btn-secondary');});

  const rows = all.filter(s => shipFilter==='all' ? true : s.status===shipFilter);
  const tb = document.getElementById('ship-list-body');
  const bulkBar = document.getElementById('ship-bulk-actions');

  // 登録済 → 「請求先×納品先×納品予定日」でまとめて1出荷扱い（チェックで一括出荷）
  if (shipFilter === 'registered') {
    if (bulkBar) bulkBar.innerHTML = `
      <label style="font-size:12px;color:var(--text2)"><input type="checkbox" id="ship-grp-all" onchange="toggleAllShipGroups(this.checked)"> 全選択</label>
      <button class="btn btn-primary btn-sm" onclick="bulkShipSelected()">✓ 選択を一括出荷</button>`;
    shipGroups = {};
    rows.forEach(s=>{
      const key = `${s.channel_id}|${s.dest_name||''}|${s.delivery_date||''}`;
      (shipGroups[key] = shipGroups[key] || {items:[],ids:[],channel_id:s.channel_id,dest:s.dest_name||'',ddate:s.delivery_date||'',amount:0})
      shipGroups[key].items.push(s); shipGroups[key].ids.push(s.id);
      shipGroups[key].amount += (s.qty||0)*(s.unit_price||0);
    });
    const keys = Object.keys(shipGroups).sort((a,b)=>{
      const ad=shipGroups[a].ddate||'￿', bd=shipGroups[b].ddate||'￿';
      return ad<bd?-1:(ad>bd?1:0);
    });
    const body = keys.map(k=>{
      const g = shipGroups[k];
      const detail = g.items.map(s=>`${s.item_type==='freight'?'送料':esc(prodName[s.product_id]||'')}×${fmt(s.qty)}`).join('、');
      return `<tr style="background:rgba(255,193,7,.06)">
        <td class="no-print" style="text-align:center"><input type="checkbox" class="ship-grp-cb" value="${esc(k)}"></td>
        <td style="text-align:center;white-space:nowrap">${(g.ddate||'').slice(5)||'―'}</td>
        <td style="text-align:left">${esc(chName[g.channel_id]||'')}</td>
        <td style="text-align:left">${esc(g.dest||'―')}</td>
        <td style="text-align:left">${detail}</td>
        <td style="text-align:right">¥${fmt(g.amount)}</td>
        <td class="no-print" style="white-space:nowrap">
          <button class="btn btn-primary btn-sm" onclick="shipGroup('${esc(k)}')">出荷</button>
          <button class="btn btn-secondary btn-sm" style="margin-left:4px;color:var(--danger)" onclick="deleteShipGroup('${esc(k)}')">削除</button>
        </td>
      </tr>`;
    }).join('');
    if (tb) {
      tb.closest('table').querySelector('thead').innerHTML = `<tr>
        <th class="no-print"></th><th>納品予定</th><th style="text-align:left">請求先</th><th style="text-align:left">納品先</th>
        <th style="text-align:left">商品（数量）</th><th>金額</th><th class="no-print"></th></tr>`;
      tb.innerHTML = body || '<tr><td colspan="7" class="text-muted text-center" style="padding:20px">登録済の出荷はありません</td></tr>';
    }
    return;
  }

  // すべて／出荷済 → 明細行のフラット表示
  if (bulkBar) bulkBar.innerHTML = '';
  if (shipSort === 'delivery') {
    rows.sort((a,b)=>{ const ad=a.delivery_date||'￿', bd=b.delivery_date||'￿';
      if (ad!==bd) return ad<bd?-1:1; return (a.order_date||'')<(b.order_date||'')?-1:1; });
  } else {
    rows.sort((a,b)=>{ const ao=a.order_date||'', bo=b.order_date||'';
      if (ao!==bo) return ao<bo?1:-1; return (b.id||0)-(a.id||0); });
  }
  const body = rows.map(s=>{
    const shipped = s.status==='shipped';
    const amt = (s.qty||0)*(s.unit_price||0);
    return `<tr style="${shipped?'':'background:rgba(255,193,7,.06)'}">
      <td style="text-align:center;white-space:nowrap">${s.order_date?.slice(5)||''}</td>
      <td style="text-align:center;white-space:nowrap">${s.delivery_date?.slice(5)||'―'}</td>
      <td style="text-align:left">${esc(chName[s.channel_id]||'')}</td>
      <td style="text-align:left">${esc(s.dest_name||'―')}</td>
      <td style="text-align:left">${s.item_type==='freight'?'送料':esc(prodName[s.product_id]||'')}</td>
      <td style="text-align:center">${fmt(s.qty)}</td>
      <td style="text-align:right">¥${fmt(s.unit_price)}</td>
      <td style="text-align:right">¥${fmt(amt)}</td>
      <td style="text-align:center">${shipped
        ? `<span style="color:var(--success,#2e7d32);font-weight:700">出荷済</span><br><span style="font-size:11px;color:var(--text2)">${s.shipped_date?.slice(5)||''}</span>`
        : '<span style="color:#b8860b;font-weight:700">登録済</span>'}</td>
      <td class="no-print" style="white-space:nowrap">
        ${shipped ? '' : `<button class="btn btn-primary btn-sm" onclick="confirmShip(${s.id})">出荷</button>`}
        <button class="btn btn-secondary btn-sm" style="margin-left:4px;color:var(--danger)" onclick="deleteShipment(${s.id})">削除</button>
      </td>
    </tr>`;
  }).join('');
  if (tb) {
    tb.closest('table').querySelector('thead').innerHTML = `<tr>
      <th>登録日</th><th>納品予定</th><th style="text-align:left">請求先</th><th style="text-align:left">納品先</th><th style="text-align:left">商品</th>
      <th>数量</th><th>単価</th><th>金額</th><th>状態</th><th class="no-print"></th></tr>`;
    tb.innerHTML = body || '<tr><td colspan="10" class="text-muted text-center" style="padding:20px">該当する出荷はありません</td></tr>';
  }
}

function toggleAllShipGroups(on) {
  document.querySelectorAll('.ship-grp-cb').forEach(cb=>cb.checked = on);
}

function _promptShipDate() {
  const t = new Date();
  const today = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  return prompt('出荷日を入力してください（請求対象月の判定に使います）', today);
}

async function shipGroup(key) {
  const g = shipGroups[key]; if (!g) return;
  const sd = _promptShipDate(); if (sd === null) return;
  const r = await fetch(`${API}/shipments/ship-bulk`, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ids:g.ids, shipped_date: sd})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast(`${r.count}件を出荷しました`); renderShipmentsPage(); } else showToast('出荷失敗', true);
}

async function bulkShipSelected() {
  const keys = [...document.querySelectorAll('.ship-grp-cb:checked')].map(cb=>cb.value);
  if (!keys.length) { showToast('出荷する行を選択してください', true); return; }
  const ids = keys.flatMap(k=>shipGroups[k]?.ids||[]);
  const sd = _promptShipDate(); if (sd === null) return;
  const r = await fetch(`${API}/shipments/ship-bulk`, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ids, shipped_date: sd})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast(`${r.count}件を出荷しました`); renderShipmentsPage(); } else showToast('出荷失敗', true);
}

async function deleteShipGroup(key) {
  const g = shipGroups[key]; if (!g) return;
  if (!confirm(`この出荷（${g.items.length}明細）を削除しますか？`)) return;
  for (const id of g.ids) {
    await fetch(`${API}/shipments/${id}`, {method:'DELETE'}).then(r=>r.json()).catch(()=>null);
  }
  showToast('削除しました'); renderShipmentsPage();
}

function prodOptionsHtml(sel) {
  // 請求先未選択時は選べない。選択時は単価表に単価がある商品＋送料(税10%)を候補に出す。
  const chSelected = !!document.getElementById('sh-ch')?.value;
  if (!chSelected) return `<option value="">先に請求先を選択</option>`;
  const opts = (cachedProducts||[]).filter(p=>p.active && shipmentPriceMap[p.id] != null)
    .map(p=>`<option value="${p.id}"${sel==p.id?' selected':''}>${esc(p.name)}（¥${fmt(shipmentPriceMap[p.id])}）</option>`).join('');
  const freight = `<option value="freight"${sel==='freight'?' selected':''}>送料（税10%）</option>`;
  return `<option value="">選択</option>` + opts + freight;
}

function addShipRow() {
  const tb = document.getElementById('sh-rows');
  if (!tb) return;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><select class="sh-pr" onchange="onShipRowProduct(this)" style="width:180px">${prodOptionsHtml('')}</select></td>
    <td><input type="number" class="sh-qty" min="0" value="0" style="width:80px;text-align:center" oninput="onShipRowChange(this)"></td>
    <td><input type="number" class="sh-price" min="0" value="0" style="width:90px;text-align:right"></td>
    <td style="text-align:right"><span class="sh-amt">¥0</span></td>
    <td class="no-print"><button class="btn btn-secondary btn-sm" style="color:var(--danger)" onclick="this.closest('tr').remove();recalcShipWarn()">×</button></td>`;
  tb.appendChild(tr);
}

async function onShipChannelChange() {
  const ch = document.getElementById('sh-ch').value;
  shipmentPriceMap = {};
  const destSel = document.getElementById('sh-dest');
  destSel.innerHTML = '<option value="">― 選択 / 直接入力 ―</option>';
  if (ch) {
    const [prices, dests] = await Promise.all([
      fetch(`${API}/product-prices?channel_id=${ch}`).then(r=>r.json()).catch(()=>[]),
      fetch(`${API}/delivery-destinations?channel_id=${ch}`).then(r=>r.json()).catch(()=>[]),
    ]);
    prices.forEach(p => shipmentPriceMap[p.product_id] = p.price);
    dests.forEach(d => { destSel.innerHTML += `<option value="${d.id}" data-name="${esc(d.name)}">${esc(d.name)}</option>`; });
  }
  // 既存行の商品候補を「単価のある商品」に組み替え、単価を更新
  document.querySelectorAll('#sh-rows .sh-pr').forEach(sel => {
    const cur = sel.value;
    sel.innerHTML = prodOptionsHtml(cur);   // 単価のない商品はリストから外れ、選択は解除される
    onShipRowProduct(sel);
  });
}

function onShipRowProduct(sel) {
  const tr = sel.closest('tr');
  const pid = sel.value;
  const priceInp = tr.querySelector('.sh-price');
  const qtyInp = tr.querySelector('.sh-qty');
  if (pid === 'freight') {
    if ((parseInt(qtyInp.value)||0) === 0) qtyInp.value = 1;   // 送料は数量1
  } else if (pid && shipmentPriceMap[pid] != null) {
    priceInp.value = shipmentPriceMap[pid];
  }
  onShipRowChange(sel);
}

function onShipRowChange(el) {
  const tr = el.closest('tr');
  const qty = parseInt(tr.querySelector('.sh-qty').value)||0;
  const price = parseInt(tr.querySelector('.sh-price').value)||0;
  tr.querySelector('.sh-amt').textContent = '¥'+fmt(qty*price);
  recalcShipWarn();
}

function recalcShipWarn() {
  const shorts = [];
  const prodName = {}; (cachedProducts||[]).forEach(p=>prodName[p.id]=p.name);
  document.querySelectorAll('#sh-rows tr').forEach(tr => {
    const pid = tr.querySelector('.sh-pr')?.value;
    const qty = parseInt(tr.querySelector('.sh-qty')?.value)||0;
    if (pid && inventoryAvailMap[pid] != null && qty > inventoryAvailMap[pid]) {
      shorts.push(`${prodName[pid]}（引当可${fmt(inventoryAvailMap[pid])}＜${fmt(qty)}）`);
    }
  });
  const warn = document.getElementById('sh-warn');
  if (warn) warn.textContent = shorts.length ? `⚠️ 在庫不足：${shorts.join('、')}（登録は可能です）` : '';
}

async function submitShipments() {
  const channel_id = +document.getElementById('sh-ch').value || null;
  if (!channel_id) { showToast('請求先を選択してください', true); return; }
  const destSel = document.getElementById('sh-dest');
  const selOpt = destSel.options[destSel.selectedIndex];
  const freeName = document.getElementById('sh-dest-free').value.trim();
  let dest_id = null, dest_name = '';
  if (destSel.value) { dest_id = +destSel.value; dest_name = selOpt.dataset.name || ''; }
  else if (freeName) { dest_name = freeName; }
  const items = [];
  document.querySelectorAll('#sh-rows tr').forEach(tr => {
    const sel = tr.querySelector('.sh-pr').value;
    const qty = parseInt(tr.querySelector('.sh-qty').value)||0;
    const price = parseInt(tr.querySelector('.sh-price').value)||0;
    if (sel === 'freight') {
      if (price > 0) items.push({item_type:'freight', qty: qty||1, unit_price:price});
    } else {
      const pid = +sel || null;
      if (pid && qty > 0) items.push({product_id:pid, qty, unit_price:price});
    }
  });
  if (!items.length) { showToast('商品と数量を入力してください（送料は金額を入力）', true); return; }
  const body = {
    order_date: document.getElementById('sh-date').value,
    delivery_date: document.getElementById('sh-ddate').value,
    channel_id, dest_id, dest_name, items
  };
  const r = await fetch(`${API}/shipments/bulk`, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast(`${r.count}件登録しました`); renderShipmentsPage(); } else showToast(r?.error||'登録失敗', true);
}

async function confirmShip(id) {
  const t = new Date();
  const today = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  const shipped = prompt('出荷日を入力してください（請求対象月の判定に使います）', today);
  if (shipped === null) return;
  const r = await fetch(`${API}/shipments/${id}/ship`, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({shipped_date: shipped || today})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast('出荷を確定しました'); renderShipmentsPage(); } else showToast('出荷失敗', true);
}

async function deleteShipment(id) {
  if (!confirm('この出荷登録を削除しますか？')) return;
  const r = await fetch(`${API}/shipments/${id}`, {method:'DELETE'}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast('削除しました'); renderShipmentsPage(); } else showToast('削除失敗', true);
}

// ── 請求書（請求先×月、出荷済を集計・軽減税率8%・税込）──

function shipAnalysisRows(items, label, idKey) {
  const total = items.reduce((a,b)=>a+b.amount,0) || 1;
  return items.map(it=>`
    <tr>
      <td style="text-align:left">${esc(it.name||'―')}</td>
      <td class="text-right">${fmt(it.qty)}</td>
      <td class="text-right">¥${fmt(it.amount)}</td>
      <td class="text-right">${Math.round(it.amount/total*1000)/10}%</td>
    </tr>`).join('');
}

function drawShipAnalysis() {
  const data = window._shipAnalysis;
  const body = document.getElementById('ship-analysis-body');
  if (!data || !(data.lines||[]).length) {
    body.innerHTML = `<div class="text-muted text-center" style="padding:40px">この月の出荷はありません。</div>`;
    return;
  }
  const v = shipAnalysisView;
  if (v === 'date') {
    const rows = data.lines.map(l=>`
      <tr>
        <td>${(l.order_date||'').slice(5)}</td>
        <td>${(l.delivery_date||'').slice(5)||'―'}</td>
        <td style="text-align:left">${esc(l.channel_name)}</td>
        <td style="text-align:left">${esc(l.dest_name||'―')}</td>
        <td style="text-align:left">${esc(l.product_name)}</td>
        <td class="text-right">${fmt(l.qty)}</td>
        <td class="text-right">¥${fmt(l.unit_price)}</td>
        <td class="text-right">¥${fmt(l.amount)}</td>
        <td class="text-center">${l.status==='shipped'?'出荷済':'登録済'}</td>
      </tr>`).join('');
    body.innerHTML = `
      <div class="card"><div class="card-header"><span class="card-title">日別明細</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>登録日</th><th>納品予定</th><th style="text-align:left">取引先</th><th style="text-align:left">納品先</th><th style="text-align:left">商品</th><th>数量</th><th>単価</th><th>金額</th><th>状態</th></tr></thead>

          <td class="text-right">${fmt(data.total_qty)}</td><td></td>
          <td class="text-right">¥${fmt(data.total_amount)}</td><td></td>
        </tr></tfoot>
      </table></div></div>`;
    return;
  }
  const map = {channel:['取引先','by_channel'],product:['商品','by_product'],dest:['納品先','by_dest']}[v];
  const items = data[map[1]] || [];
  body.innerHTML = `
    <div class="card"><div class="card-header"><span class="card-title">${map[0]}別</span></div>
    <div class="table-wrap"><table>
      <thead><tr><th style="text-align:left;min-width:180px">${map[0]}</th><th>数量</th><th>金額</th><th>構成比</th></tr></thead>
      <tbody>${shipAnalysisRows(items)}</tbody>
      <tfoot><tr class="fw-bold" style="background:var(--surface2)">
        <td class="left">合計</td><td class="text-right">${fmt(data.total_qty)}</td>
        <td class="text-right">¥${fmt(data.total_amount)}</td><td class="text-right">100%</td>
      </tr></tfoot>

}

async function copyPrevWeekMenus(dstMonday) {
  const dst = new Date(dstMonday);
  const src = new Date(dst); src.setDate(dst.getDate() - 7);
  const srcStr = src.toISOString().slice(0, 10);
  if (!confirm(`${srcStr} 週のメニューをコピーしますか？現在の入力は上書きされます。`)) return;
  const r = await fetch(`${API}/weekly-menus/week-copy`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({src_start: srcStr, dst_start: dstMonday})
  }).then(r => r.json()).catch(() => null);
  if (r?.ok) { showToast(`${r.copied}件コピーしました`); renderMenuPage(); }
  else showToast('コピー失敗', true);

async function renderAdminShiftsPage() {
  setLoading();
  const mondayStr = getMondayOf(currentDate);
  const days = getWeekDays(mondayStr);
  const DOW = ['月','火','水','木','金','土'];

  const shifts = await fetch(`${API}/shifts/week?week_start=${mondayStr}`).then(r=>r.json()).catch(()=>[]);
  const shiftMap = {};
  shifts.forEach(s => {
    if (!shiftMap[s.member_name]) shiftMap[s.member_name] = {};
    shiftMap[s.member_name][s.date] = s.planned_hours;
  });

  const dayHeaders = days.map((d, i) => {
    const dt = new Date(d);
    return `<th style="min-width:64px;text-align:center">${(dt.getMonth()+1)}/${dt.getDate()}<br><span style="font-size:10px;font-weight:400">${DOW[i]}</span></th>`;
  }).join('');

  const rows = cachedMembers.map(m => {
    const cells = days.map(d => {
      const v = shiftMap[m.name]?.[d] || '';
      return `<td><input type="number" min="0" max="24" step="0.5" value="${v}" placeholder="―"
        style="width:52px;text-align:center;font-size:13px" data-member="${m.name}" data-date="${d}" class="week-shift-inp"></td>`;
    }).join('');
    return `<tr>
      <td class="left" style="white-space:nowrap;font-weight:500">${m.name}</td>
      <td style="color:var(--text3);font-size:12px;text-align:right">¥${m.hourly_wage.toLocaleString()}</td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="no-print btn-group mb-16">
      <button class="btn btn-secondary btn-sm" onclick="shiftAdminShiftsWeek('${mondayStr}',-7)">◀ 前の週へ</button>
      <button class="btn btn-secondary btn-sm" onclick="shiftAdminShiftsWeek('${mondayStr}',7)">次の週へ ▶</button>
      <button class="btn btn-primary btn-sm" onclick="saveWeekShifts('${mondayStr}')">💾 保存</button>
      <span class="text-muted" style="font-size:12px;align-self:center">${mondayStr} 〜 ${days[5]}</span>
      <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="copyPrevWeekShifts('${mondayStr}')">📋 前の週のシフトをコピー</button>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">週間シフト予定</span>
        <span class="text-muted" style="font-size:12px">時間数を入力</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="text-align:left;min-width:100px">メンバー</th>
            <th style="min-width:60px;text-align:right">時給</th>
            ${dayHeaders}
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="8" class="text-muted text-center" style="padding:20px">メンバーマスタに登録してください</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  `;
}

async function saveWeekShifts(mondayStr) {
  const inputs = document.querySelectorAll('.week-shift-inp');
  const shifts = [];
  inputs.forEach(inp => {
    const h = parseFloat(inp.value) || 0;
    if (h > 0) shifts.push({date: inp.dataset.date, member_name: inp.dataset.member, hours: h});
  });
  const r = await fetch(`${API}/shifts/week-bulk`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({week_start: mondayStr, shifts})
  }).then(r => r.json()).catch(() => null);
  if (r?.ok) showToast('保存しました'); else showToast('保存失敗', true);
}

function shiftAdminShiftsWeek(currentMonday, deltaDays) {
  const d = new Date(currentMonday);
  d.setDate(d.getDate() + deltaDays);
  const next = d.toISOString().slice(0, 10);
  currentDate = next;
  document.getElementById('global-date').value = next;
  renderAdminShiftsPage();
}

async function copyPrevWeekShifts(dstMonday) {
  const dst = new Date(dstMonday);
  const src = new Date(dst); src.setDate(dst.getDate() - 7);
  const srcStr = src.toISOString().slice(0, 10);
  if (!confirm(`${srcStr} 週のシフトをコピーしますか？現在の入力は上書きされます。`)) return;
  const r = await fetch(`${API}/shifts/week-copy`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({src_start: srcStr, dst_start: dstMonday})
  }).then(r => r.json()).catch(() => null);
  if (r?.ok) { showToast(`${r.copied}件コピーしました`); renderAdminShiftsPage(); }
  else showToast('コピー失敗', true);
}

// ═══════════════════════════════════════════════
// 売上実績取込（過去データ・日次CSV）
// CSV をブラウザでパース → プレビュー → /api/import/sales-actuals へ送信
// ═══════════════════════════════════════════════
const IMPORT_FIELDS = [
  {key:'date',         label:'日付',     aliases:['日付','date','年月日','日にち'], required:true},
  {key:'total_sales',  label:'売上合計', aliases:['売上合計','売上','total_sales','sales']},
  {key:'west_sales',   label:'西店',     aliases:['西店','西','west_sales','west']},
  {key:'south_sales',  label:'南店',     aliases:['南店','南','south_sales','south']},
  {key:'other_sales',  label:'その他',   aliases:['その他','他','other_sales','other']},
  {key:'labor_cost',   label:'人件費',   aliases:['人件費','labor_cost','labor']},
  {key:'total_hours',  label:'総人時',   aliases:['総人時','人時','total_hours','hours']},
  {key:'material_cost',label:'原価',     aliases:['原価','材料費','material_cost','material']},
  {key:'expense',      label:'経費',     aliases:['経費','expense']},
  {key:'profit',       label:'利益',     aliases:['利益','profit']},
  {key:'weather',      label:'天気',     aliases:['天気','weather']},
];
let importRows = [];   // {row, ok, msg, data:{...}}

function impNormHeader(h){ return String(h||'').replace(/\s/g,'').replace(/[（(].*?[)）]/g,'').toLowerCase(); }
function impNum(v){
  if(v==null) return null;
  const s=String(v).replace(/[,¥円\s]/g,'').trim();
  if(s==='') return null;
  const n=Number(s); return isNaN(n)?NaN:n;
}
function impDate(v){
  const s=String(v||'').trim().replace(/\//g,'-');
  const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(!m) return null;
  return `${m[1]}-${String(+m[2]).padStart(2,'0')}-${String(+m[3]).padStart(2,'0')}`;
}
function parseCSV(text){
  text = text.replace(/^﻿/, '');
  const lines = text.split(/\r\n|\n|\r/).filter(l=>l.trim()!=='');
  return lines.map(line=>{
    const out=[]; let cur=''; let q=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else { if(ch==='"') q=true; else if(ch===','){out.push(cur);cur='';} else cur+=ch; }
    }
    out.push(cur); return out.map(c=>c.trim());
  });
}

async function renderImportPage(){
  importRows = [];
  document.getElementById('content').innerHTML = `
    <div class="card mb-16">
      <div class="card-header"><span class="card-title">売上実績の取込（過去データ・日次）</span></div>
      <div class="card-body">
        <p class="text-muted" style="font-size:13px;line-height:1.7;margin-bottom:10px">
          過去の売上実績を <b>日別（1日1行）</b> の CSV で取り込みます。月次・年次サマリは日別データを自動集計するため、取り込んだ瞬間に各サマリへ反映されます。<br>
          取り込んだ日は<b>確定済み</b>として保存され、システムの自動再計算で上書きされません（後から編集したい場合は売上日報画面で確定解除できます）。
        </p>
        <ul class="text-muted" style="font-size:13px;line-height:1.8;margin:0 0 12px 18px">
          <li>文字コードは <b>UTF-8</b>、1行目は見出し行。</li>
          <li><b>日付</b>は必須（例 <code>2023-04-01</code> / <code>2023/4/1</code>）。その他の列は空欄なら 0 とみなします。</li>
          <li><b>利益</b>が空欄なら「売上合計 − 原価 − 人件費 − 経費」で自動計算します。</li>
        </ul>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <button class="btn btn-secondary btn-sm" onclick="downloadImportTemplate()">⬇ テンプレートCSVをダウンロード</button>
          <label class="btn btn-primary btn-sm" style="cursor:pointer">
            📁 CSVファイルを選択
            <input type="file" accept=".csv,text/csv" style="display:none" onchange="handleImportFile(event)">
          </label>
        </div>
      </div>
    </div>
    <div id="import-preview"></div>`;
}

function downloadImportTemplate(){
  const header = IMPORT_FIELDS.map(f=>f.label).join(',');
  const sample = '2023-04-01,250000,120000,90000,40000,45000,28,80000,12000,,晴';
  const blob = new Blob(['﻿'+header+'\n'+sample+'\n'], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sales_actuals_template.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function handleImportFile(ev){
  const file = ev.target.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => { processImportCSV(e.target.result); };
  reader.readAsText(file, 'UTF-8');
  ev.target.value = '';  // 同じファイルを再選択できるようにする
}

function processImportCSV(text){
  const grid = parseCSV(text);
  if(grid.length < 2){ showToast('データ行が見つかりません', true); return; }
  // 見出し行から列インデックスを特定
  const headers = grid[0].map(impNormHeader);
  const colIdx = {};
  for(const f of IMPORT_FIELDS){
    const al = f.aliases.map(impNormHeader);
    colIdx[f.key] = headers.findIndex(h => al.includes(h));
  }
  if(colIdx.date < 0){ showToast('「日付」列が見つかりません。テンプレートの見出しをご確認ください', true); return; }

  importRows = [];
  const seen = new Set();
  for(let i=1;i<grid.length;i++){
    const cells = grid[i];
    const get = k => colIdx[k]>=0 ? (cells[colIdx[k]] ?? '') : '';
    const rownum = i+1;
    const d = impDate(get('date'));
    if(!d){ importRows.push({row:rownum, ok:false, msg:'日付が不正', data:{date:get('date')}}); continue; }
    if(seen.has(d)){ importRows.push({row:rownum, ok:false, msg:'日付が重複', data:{date:d}}); continue; }
    seen.add(d);
    const nums = {}; let badField = null;
    for(const f of ['total_sales','west_sales','south_sales','other_sales','labor_cost','total_hours','material_cost','expense','profit']){
      const v = impNum(get(f));
      if(Number.isNaN(v)){ badField = f; break; }
      nums[f] = v;  // null = 空欄
    }
    if(badField){ importRows.push({row:rownum, ok:false, msg:`「${IMPORT_FIELDS.find(x=>x.key===badField).label}」が数値ではありません`, data:{date:d}}); continue; }
    const profitComputed = nums.profit==null;
    const profit = profitComputed ? ((nums.total_sales||0)-(nums.material_cost||0)-(nums.labor_cost||0)-(nums.expense||0)) : nums.profit;
    importRows.push({row:rownum, ok:true, profitComputed, data:{
      _row:rownum, date:d, weather:get('weather'),
      total_sales:nums.total_sales, west_sales:nums.west_sales, south_sales:nums.south_sales,
      other_sales:nums.other_sales, labor_cost:nums.labor_cost, total_hours:nums.total_hours,
      material_cost:nums.material_cost, expense:nums.expense, profit:nums.profit, _profitView:profit,
    }});
  }
  renderImportPreview();
}

function renderImportPreview(){
  const okRows  = importRows.filter(r=>r.ok);
  const errRows = importRows.filter(r=>!r.ok);
  const previewRows = importRows.slice(0, 100).map(r=>{
    const d = r.data;
    if(!r.ok) return `<tr style="background:#fdecea">
      <td>${r.row}</td><td class="left">${d.date??''}</td>
      <td colspan="9" style="color:var(--danger);text-align:left">⚠️ ${r.msg}</td></tr>`;
    return `<tr>
      <td>${r.row}</td><td class="left">${d.date}</td>
      <td>${fmt(d.total_sales||0)}</td><td>${fmt(d.west_sales||0)}</td><td>${fmt(d.south_sales||0)}</td>
      <td>${fmt(d.other_sales||0)}</td><td>${fmt(d.labor_cost||0)}</td><td>${(d.total_hours||0)}</td>
      <td>${fmt(d.material_cost||0)}</td><td>${fmt(d.expense||0)}</td>
      <td>${fmt(d._profitView||0)}${r.profitComputed?'<span class="text-muted" style="font-size:10px"> 自動</span>':''}</td></tr>`;
  }).join('');

  document.getElementById('import-preview').innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="card-title">プレビュー</span>
        <span style="font-size:13px">取込可能 <b style="color:var(--accent)">${okRows.length}</b> 件 ／ エラー <b style="color:var(--danger)">${errRows.length}</b> 件</span>
      </div>
      <div class="card-body">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:12px">
          <input type="checkbox" id="import-overwrite">
          既存の確定済みデータも上書きする（通常はオフ。オフの場合、既に確定済みの日付はスキップされます）
        </label>
        <div class="table-wrap" style="max-height:460px;overflow:auto">
          <table>
            <thead><tr>
              <th>行</th><th style="text-align:left">日付</th><th>売上合計</th><th>西店</th><th>南店</th>
              <th>その他</th><th>人件費</th><th>総人時</th><th>原価</th><th>経費</th><th>利益</th>
            </tr></thead>
            <tbody>${previewRows || '<tr><td colspan="11" class="text-center text-muted" style="padding:20px">データなし</td></tr>'}</tbody>
          </table>
        </div>
        ${importRows.length>100 ? `<p class="text-muted text-center" style="font-size:12px;margin-top:8px">先頭100件のみ表示（全${importRows.length}件）</p>`:''}
        <div style="margin-top:14px;text-align:right">
          <button class="btn btn-primary" onclick="executeImport()" ${okRows.length? '':'disabled'}>
            📥 ${okRows.length}件を取り込む
          </button>
        </div>
      </div>
    </div>`;
}

async function executeImport(){
  const okRows = importRows.filter(r=>r.ok);
  if(!okRows.length){ showToast('取込可能なデータがありません', true); return; }
  const overwrite = document.getElementById('import-overwrite')?.checked || false;
  if(!confirm(`${okRows.length}件の売上実績を取り込みます。よろしいですか？`)) return;
  const btn = event?.target; if(btn){ btn.disabled = true; btn.textContent = '取込中...'; }
  const payload = {overwrite, rows: okRows.map(r=>r.data)};
  const res = await fetch(`${API}/import/sales-actuals`, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)}).then(r=>r.json()).catch(()=>null);
  if(!res?.ok){ showToast('取込に失敗しました', true); if(btn){btn.disabled=false;btn.textContent=`📥 ${okRows.length}件を取り込む`;} return; }
  let msg = `${res.imported}件を取り込みました`;
  if(res.skipped?.length) msg += ` ／ 既存確定のためスキップ ${res.skipped.length}件`;
  showToast(msg);
  document.getElementById('import-preview').innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">取込結果</span></div>
      <div class="card-body" style="font-size:14px;line-height:1.9">
        <div>✅ 取込件数：<b>${res.imported}</b> 件</div>
        ${res.skipped?.length ? `<div>⏭ スキップ（既存確定済み・上書きオフ）：<b>${res.skipped.length}</b> 件<div class="text-muted" style="font-size:12px">${res.skipped.slice(0,30).join(', ')}${res.skipped.length>30?' …':''}</div></div>`:''}
        ${res.errors?.length ? `<div style="color:var(--danger)">⚠️ サーバー側エラー：<b>${res.errors.length}</b> 件<div style="font-size:12px">${res.errors.slice(0,20).map(e=>`行${e.row}: ${e.msg}`).join('<br>')}</div></div>`:''}
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="showPage('monthly')">📈 月次サマリで確認</button>
          <button class="btn btn-secondary btn-sm" onclick="renderImportPage()">続けて取込む</button>
        </div>
      </div>
    </div>`;
}

init();
</script>
