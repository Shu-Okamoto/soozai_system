<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>惣菜本部 業務システム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=BIZ+UDGothic:wght@400;700&display=swap');
  :root {
    --bg:#F7F5F0; --surface:#fff; --surface2:#F0EDE7; --border:#DDD9D0;
    --accent:#3B6E3F; --accent-light:#E8F4E9;
    --warn:#C17B2A; --warn-light:#FFF3E0;
    --danger:#C0392B; --danger-light:#FDECEA;
    --text:#1A1A18; --text2:#5A5A55; --text3:#9A9A90;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'BIZ UDGothic',sans-serif;background:var(--bg);color:var(--text);font-size:16px;min-height:100vh}
  .app{display:flex;min-height:100vh}
  .sidebar{width:230px;background:#1A1A18;color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;transition:transform .25s ease}
  .sidebar.closed{transform:translateX(-230px)}
  .main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .25s ease}
  .main.sidebar-closed{margin-left:0}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
  .content{padding:20px;flex:1}

  .sidebar-logo{padding:18px 14px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
  .sidebar-logo h1{font-size:13px;font-weight:700;line-height:1.5}
  .sidebar-logo p{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
  .nav-group{padding:4px 0}
  .nav-label{font-size:11px;color:rgba(255,255,255,.3);padding:10px 14px 4px;letter-spacing:.1em;font-weight:700}
  .nav-item{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;font-size:15px;color:rgba(255,255,255,.7);border:none;background:none;width:100%;text-align:left;transition:all .15s;min-height:48px}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .nav-item.active{background:var(--accent);color:#fff;font-weight:700}
  .sidebar-bottom{margin-top:auto;padding:10px 14px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.3)}

  .page-title{font-size:17px;font-weight:700}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .topbar-right label{font-size:14px;color:var(--text2)}

  input[type="date"],input[type="text"],input[type="number"],select,textarea{
    border:1px solid var(--border);border-radius:6px;padding:8px 11px;font-size:15px;
    font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;min-height:44px}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
  input[type="number"]{text-align:right}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);margin-bottom:16px}
  .card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-title{font-size:16px;font-weight:700}
  .card-body{padding:16px}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:6px;border:none;cursor:pointer;font-size:15px;font-family:inherit;font-weight:700;transition:all .15s;white-space:nowrap;min-height:44px}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#2D5831}
  .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--surface2)}
  .btn-warn{background:var(--warn);color:#fff}.btn-warn:hover{background:#A06020}
  .btn-sm{padding:6px 12px;font-size:13px;min-height:36px}
  .btn-group{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:20px}
  th{background:var(--surface2);color:var(--text2);font-weight:700;padding:10px 10px;text-align:center;border:1px solid var(--border);font-size:20px;white-space:nowrap}
  td{padding:8px 10px;border:1px solid var(--border);text-align:center;vertical-align:middle}
  td.left{text-align:left}
  tr:hover td{background:#FAFAF8}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .kpi-label{font-size:13px;color:var(--text2);margin-bottom:4px}
  .kpi-value{font-size:24px;font-weight:700;line-height:1.2}
  .kpi-value.green{color:var(--accent)}.kpi-value.warn{color:var(--warn)}.kpi-value.red{color:var(--danger)}
  .kpi-sub{font-size:13px;color:var(--text3);margin-top:3px}

  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:18px;font-weight:700}
  .badge-green{background:var(--accent-light);color:var(--accent)}
  .badge-gray{background:var(--surface2);color:var(--text2)}

  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group label{font-size:14px;color:var(--text2);font-weight:500}
  .form-group input,.form-group select,.form-group textarea{width:100%}

  .week-grid{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .wc{background:var(--surface);padding:6px 8px;font-size:18px}
  .wc.hdr{background:var(--surface2);font-weight:700;text-align:center;color:var(--text2);font-size:18px}
  .wc.cat{background:var(--surface2);font-size:18px;display:flex;align-items:center;font-weight:500}
  .wc input{width:100%;border:none;padding:3px 4px;font-size:18px;background:transparent;font-family:inherit;outline:none}
  .wc input:focus{background:var(--accent-light);border-radius:3px}
  .wc select{width:100%;border:none;padding:3px 4px;font-size:18px;background:transparent;font-family:inherit;outline:none;cursor:pointer}
  .wc select:focus{background:var(--accent-light);border-radius:3px}
  .wc.sat{background:#F0F4FF}

  .shift-list{display:flex;flex-direction:column;gap:6px}
  .shift-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
  .shift-row:last-child{border-bottom:none}
  .shift-name{flex:1;font-size:15px}

  .alert{padding:11px 14px;border-radius:7px;font-size:15px;margin-bottom:12px}
  .alert-warn{background:var(--warn-light);color:var(--warn)}
  .loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text3)}
  .spinner{width:18px;heigh:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:20px;right:20px;background:#1A1A18;color:#fff;padding:13px 18px;border-radius:8px;font-size:15px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:300px}
  .toast.show{opacity:1}
  .divider{height:1px;background:var(--border);margin:10px 0}
  .text-right{text-align:right}.text-center{text-align:center}.text-muted{color:var(--text3)}
  .text-green{color:var(--accent)}.text-warn{color:var(--warn)}.text-danger{color:var(--danger)}
  .fw-bold{font-weight:700}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
  .flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}

  @media print{
    .sidebar,.topbar,.no-print{display:none!important}
    .main{margin-left:0}
    .content{padding:4px}
    .card{box-shadow:none;border:1px solid #ccc;margin-bottom:8px;page-break-inside:avoid}
    body{background:#fff;font-size:12px}
    table{font-size:11px}
    th,td{padding:3px 5px}
    .print-header{display:block!important}
    tr:has(td[id^="rt_"]:empty){display:none}
    #plan-table{font-size:24px!important}
    #plan-table th{font-size:18px!important}
    /* 請求書は1請求先=1ページに収める */
    .invoice-sheet{page-break-inside:avoid;page-break-after:always;border:none!important}
    .invoice-sheet:last-child{page-break-after:auto}
    .invoice-table{font-size:11px}
    .invoice-table th,.invoice-table td{padding:2px 6px}
  }
  .print-header{display:none;text-align:center;margin-bottom:8px}
  .print-header h2{font-size:16px;font-weight:bold}
  .print-header p{font-size:16px;margin-top:2px}
  .print-only{display:none}
  .hidden{display:none!important}
  @media print{.print-only{display:flex!important;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:8px;font-size:16px}
    .print-only strong{font-size:18px}}
  #plan-table{font-size:24px}
  #plan-table th{font-size:18px}
  #plan-table input[type="number"]{font-size:24px!important;text-align:center}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>惣菜本部 業務システム</h1>
      <p id="dept-label">みかわ 弁当・惣菜部</p>
    </div>
    <div class="nav-group">
      <div class="nav-label">日次業務</div>
      <button class="nav-item active" onclick="showPage('plan')"   id="nav-plan">📋 出荷指示書</button>
      <button class="nav-item"        onclick="showPage('actual')" id="nav-actual">✏️ 出荷実績入力</button>
      <button class="nav-item"        onclick="showPage('report')" id="nav-report">📊 売上日報</button>
      <button class="nav-item"        onclick="showPage('menu')"   id="nav-menu">🍱 週間献立表</button>
      <button class="nav-item"        onclick="showPage('order')"  id="nav-order">🛒 発注</button>
      <button class="nav-item"        onclick="showPage('checklist')" id="nav-checklist">✅ チェックリスト</button>
    </div>
    <div class="nav-group" id="navgroup-pickles" style="display:none">
      <div class="nav-label">製造・出荷</div>
      <button class="nav-item" onclick="showPage('production')" id="nav-production">🏭 製造日報</button>
      <button class="nav-item" onclick="showPage('inventory')"  id="nav-inventory">📦 在庫</button>
      <button class="nav-item" onclick="showPage('shipments')"  id="nav-shipments">🚚 出荷登録</button>
      <button class="nav-item admin-only" onclick="showPage('invoice')" id="nav-invoice">🧾 請求書</button>
    </div>
    <div class="nav-group admin-only">
      <div class="nav-label">管理者業務</div>
      <button class="nav-item" onclick="showPage('adminplan')"   id="nav-adminplan">📋 出荷計画</button>
      <button class="nav-item" onclick="showPage('adminmenu')"   id="nav-adminmenu">🍱 献立作成</button>
      <button class="nav-item" onclick="showPage('adminshifts')" id="nav-adminshifts">📅 シフト作成</button>
    </div>
    <div class="nav-group admin-only" id="navgroup-analysis">
      <div class="nav-label">分析</div>
      <button class="nav-item" onclick="showPage('monthly')" id="nav-monthly">📈 月次サマリ</button>
      <button class="nav-item" onclick="showPage('yearly')"  id="nav-yearly">📈 年次サマリ</button>
      <button class="nav-item" onclick="showPage('shipanalysis')" id="nav-shipanalysis">🚚 出荷分析</button>
    </div>
    <div class="nav-group admin-only" id="navgroup-data">
      <div class="nav-label">データ管理</div>
      <button class="nav-item" onclick="showPage('import')" id="nav-import">📥 売上実績取込</button>
    </div>
    <div class="nav-group admin-only">
      <div class="nav-label">マスタ</div>
      <button class="nav-item" onclick="showPage('master')"     id="nav-master">⚙️ 商品マスタ</button>
      <button class="nav-item" onclick="showPage('categories')" id="nav-categories">🏷 カテゴリマスタ</button>
      <button class="nav-item" onclick="showPage('channels')"   id="nav-channels">🏪 出荷先マスタ</button>
      <button class="nav-item" onclick="showPage('orderproducts')" id="nav-orderproducts">🧾 発注商品マスタ</button>
      <button class="nav-item" onclick="showPage('suppliers')"  id="nav-suppliers">🚚 業者マスタ</button>
      <button class="nav-item" onclick="showPage('pricelist')"  id="nav-pricelist">💴 単価表マスタ</button>
      <button class="nav-item" onclick="showPage('deliverydests')" id="nav-deliverydests">📍 納品先マスタ</button>
      <button class="nav-item" onclick="showPage('issuer')"     id="nav-issuer">🏢 自社情報マスタ</button>
      <button class="nav-item" onclick="showPage('members')"    id="nav-members">👤 メンバーマスタ</button>
    </div>
    <div class="sidebar-bottom">
      <div id="sidebar-date"></div>
      <button onclick="showRoleSelection()" style="margin-top:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);border-radius:5px;padding:5px 10px;font-size:12px;cursor:pointer;width:100%;font-family:inherit" id="role-label">切り替え</button>
    </div>
  </nav>

  <div class="main">
    <header class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;font-size:22px;padding:4px 8px;color:var(--text2);line-height:1;margin-right:8px" title="メニュー">☰</button>
      <div class="page-title" id="page-title">出荷指示書</div>
      <div class="topbar-right">
        <label>対象日</label>
        <input type="date" id="global-date" onchange="onDateChange()">
      </div>
    </header>
    <main class="content" id="content">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </main>
  </div>
</div>
<div class="toast" id="toast"></div>

<div id="role-overlay" style="position:fixed;inset:0;z-index:9999;background:#1A1A18;display:flex;align-items:center;justify-content:center">
  <!-- ロール選択 -->
  <div id="role-select-view" style="text-align:center;color:#fff;padding:40px">
    <div style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:8px">みかわ 弁当・惣菜部</div>
    <h2 style="font-size:24px;font-weight:700;margin-bottom:40px">惣菜本部 業務システム</h2>
    <div style="display:flex;gap:20px;justify-content:center">
      <button onclick="selectRole('member')"
        style="background:#3B6E3F;color:#fff;border:none;border-radius:12px;padding:24px 40px;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;min-width:160px">
        👤 メンバー
      </button>
      <button onclick="showPinInput()"
        style="background:#555;color:#fff;border:none;border-radius:12px;padding:24px 40px;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;min-width:160px">
        🔧 管理者
      </button>
    </div>
  </div>
  <!-- PIN入力 -->
  <div id="pin-input-view" style="display:none;text-align:center;color:#fff;padding:40px">
    <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">管理者 PINコード</h2>
    <p style="font-size:14px;color:rgba(255,255,255,.4);margin-bottom:28px">PINを入力してください</p>
    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:16px">
      <input type="password" id="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*"
        onkeydown="if(event.key==='Enter')verifyPin()"
        style="width:140px;font-size:32px;text-align:center;letter-spacing:12px;border-radius:10px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;padding:12px;font-family:inherit;outline:none">
    </div>
    <div id="pin-error" style="color:#FF6B6B;font-size:14px;margin-bottom:16px;min-height:20px"></div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button onclick="showRoleSelection()"
        style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:10px 24px;font-size:15px;cursor:pointer;font-family:inherit">
        ← 戻る
      </button>
      <button onclick="verifyPin()"
        style="background:#3B6E3F;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">
        確認
      </button>
    </div>
  </div>
</div>

<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:5050/api'
  : '/api';
// PINはサーバー側で検証する（本部=環境変数 HQ_ADMIN_PIN、部署別=hq_departments.config.admin_pin）
let currentRole = sessionStorage.getItem('sozai_role') || null;

// ─── 部署(department) ───────────────────────────
// 部署は URL で決まる： / = 弁当部, /mochi = 餅部, /tsukemono = 漬物部。
// アプリ内での部署切替は行わない（入口＝URLで分離）。弁当部は従来どおりの挙動。
let currentDept = (location.pathname.replace(/^\/+/, '').split('/')[0].toLowerCase() || 'bento');
let cachedDepartments = [];
let currentDeptObj    = null;

// 全 API 呼び出しに ?dept=<code> を自動付与する（個々の fetch を書き換えずに一元化）
const _origFetch = window.fetch.bind(window);
window.fetch = function(input, opts) {
  if (typeof input === 'string' && input.startsWith(API) && currentDept) {
    if (!/[?&]dept=/.test(input)) {
      input += (input.includes('?') ? '&' : '?') + 'dept=' + encodeURIComponent(currentDept);
    }
  }
  return _origFetch(input, opts);
};

async function loadDepartments() {
  try {
    cachedDepartments = await _origFetch(API + '/departments').then(r => r.json());
  } catch (e) { cachedDepartments = []; }
  if (!Array.isArray(cachedDepartments) || !cachedDepartments.length) {
    cachedDepartments = [{code:'bento', name:'弁当惣菜部',
      config:{features:{weekly_menu:true, order_calc:true, dx_orders:true}}}];
  }
  currentDeptObj = cachedDepartments.find(d => d.code === currentDept) || null;
  // URL が未知の部署コードなら弁当部にフォールバック
  if (!currentDeptObj) {
    currentDept = 'bento';
    currentDeptObj = cachedDepartments.find(d => d.code === 'bento') || null;
  }
}

function deptFeatures() {
  return (currentDeptObj && currentDeptObj.config && currentDeptObj.config.features) || {};
}

// 部署の機能フラグでナビ項目を出し分け、ラベル/スイッチャーを更新
function applyDeptFeatures() {
  const feats = deptFeatures();
  const gate = { menu:'weekly_menu', adminmenu:'weekly_menu', order:'order_calc',
                 orderproducts:'order_calc', suppliers:'order_calc' };
  for (const [page, feat] of Object.entries(gate)) {
    const el = document.getElementById('nav-' + page);
    if (el) el.style.display = feats[feat] ? '' : 'none';
  }
  // 漬物部：製造→在庫→出荷→請求のフロー（feature: production）。
  // この導線を持つ部署では、売上ベースの弁当フロー（出荷指示書/実績/日報/分析）は隠す。
  const pickles = !!feats.production;
  const pg = document.getElementById('navgroup-pickles');
  if (pg) pg.style.display = pickles ? '' : 'none';
  const pl = document.getElementById('nav-pricelist');
  if (pl && !pickles) pl.style.display = 'none';   // 単価表は admin-only かつ production部署のみ
  const dd = document.getElementById('nav-deliverydests');
  if (dd && !pickles) dd.style.display = 'none';   // 納品先マスタも production部署のみ
  const sa = document.getElementById('nav-shipanalysis');
  if (sa && !pickles) sa.style.display = 'none';   // 出荷分析も production部署のみ
  const iss = document.getElementById('nav-issuer');
  if (iss && !pickles) iss.style.display = 'none'; // 自社情報マスタも production部署のみ
  if (pickles) {
    // 漬物部では出荷先＝請求先として扱う（マスタのラベルを変更）
    const navCh = document.getElementById('nav-channels');
    if (navCh) navCh.textContent = '🏪 請求先マスタ';
  }
  if (pickles) {
    // 弁当の売上入力フロー（出荷指示書/実績/売上日報/出荷計画）は隠す。
    // 月次・年次は残す（製造数ベースで集計して表示）。
    ['nav-plan','nav-actual','nav-report','nav-adminplan']
      .forEach(id => { const e = document.getElementById(id); if (e) e.style.display = 'none'; });
    // マスタ以外（請求書・分析）はメンバーにも表示する（admin-only を上書き）。
    ['nav-invoice','navgroup-analysis','nav-monthly','nav-yearly','nav-shipanalysis']
      .forEach(id => { const e = document.getElementById(id); if (e) e.style.display = ''; });
  }
  // 弁当部以外はサイドバーに部署名を表示（弁当部は従来表記のまま）
  const lbl = document.getElementById('dept-label');
  if (lbl && currentDeptObj && currentDept !== 'bento') lbl.textContent = 'みかわ ' + currentDeptObj.name;

// dx 店頭注文の行HTMLを返す（plan / actual / report 共通）
// mode: 'plan' | 'actual' | 'report'
// DX注文行を表示する対象カテゴリ（弁当部=弁当、餅部=餅）
function orderRowsCat() { return currentDept === 'mochi' ? '餅' : '弁当'; }

function buildInstoreOrderRows(channels, mode) {
  if (!Array.isArray(cachedInstoreOrders) || !cachedInstoreOrders.length) return '';
  const numAlign   = mode === 'report' ? 'text-right' : 'text-center';
  const priceAlign = mode === 'report' ? 'text-align:right' : '';
  return cachedInstoreOrders.map(o => {
    const qty   = Math.round(o.quantity || 0);
    const price = Math.round(o.price    || 0);
    const amt   = qty * price;
    const channelCells = channels.map(ch => {
      // 店名一致を優先（部署でチャネルIDが異なるDX店頭注文に対応）、無ければID一致
      const v = ((o.store_name && o.store_name === ch.name) || o.store_id === ch.id) ? qty : 0;
      return `<td class="${numAlign}" style="background:#FFFDE7;color:#E65100">${v || ''}</td>`;
    }).join('');
    const nameCell  = `<td class="left" style="white-space:nowrap;color:#E65100;background:#FFFDE7">${o.product_name||''}（${o.customer_name?o.customer_name+'様':''}）</td>`;
    const priceCell = `<td style="background:#FFFDE7;color:var(--text2);white-space:nowrap;${priceAlign}">¥${price.toLocaleString()}</td>`;
    let tailCells;
    if (mode === 'report') {
      tailCells = `<td class="text-right fw-bold" style="background:#F5F5F5">${qty||'―'}</td>
        <td class="text-right fw-bold" style="background:#F0F7F0">${amt?fmt(amt):'―'}</td>`;
    } else {
      // plan / actual: 合計列のみ
      tailCells = `<td class="fw-bold text-center" style="background:#F0F7F0">${qty||''}</td>`;
    }
    return `<tr data-dx-row="1" style="background:#FFFDE7">${nameCell}${priceCell}${channelCells}${tailCells}</tr>`;
  }).join('');
}


// 注文弁当（bento システム）の行HTMLを返す。dx と同じく matrix 内に行追加（配達チャネル列に数量）
// mode: 'plan' | 'actual' | 'report'
// 仕様：
//   - フリー会員（is_free_member=true）：表示は member_name 様、グループキーは member_id|product_name
//   - それ以外：表示は office_name 様、グループキーは office_id|product_name
//   - 同一グループの行は数量を加算して 1 行にまとめる
function buildBentoOrderRows(channels, mode) {
  if (!Array.isArray(cachedBentoOrders) || !cachedBentoOrders.length) return '';
  const deliveryCh = channels.find(c => c.name === '配達');
  if (!deliveryCh) return '';  // 配達チャネル未登録時は表示できないのでスキップ
  const numAlign   = mode === 'report' ? 'text-right' : 'text-center';
  const priceAlign = mode === 'report' ? 'text-align:right' : '';

  // グルーピング
  const groups = new Map();
  cachedBentoOrders.forEach(o => {
    const isFree = !!o.is_free_member;
    const displayName = isFree ? (o.member_name || '') : (o.office_name || '');
    const keyId = isFree ? (o.member_id || '') : (o.office_id || '');
    const key = `${keyId}|${o.product_name || ''}`;
    const prev = groups.get(key);
    if (prev) {
      prev.quantity += Math.round(o.quantity || 0);
    } else {
      groups.set(key, {
        product_name: o.product_name || '',
        display_name: displayName,
        price:        Math.round(o.price || 0),
        quantity:     Math.round(o.quantity || 0),
      });
    }
  });

  return Array.from(groups.values()).map(g => {
    const amt = g.quantity * g.price;
    const channelCells = channels.map(ch => {
      const v = (ch.id === deliveryCh.id) ? g.quantity : 0;
      return `<td class="${numAlign}" style="background:#E3F2FD;color:#1565C0">${v || ''}</td>`;
    }).join('');
    const nameCell  = `<td class="left" style="white-space:nowrap;color:#1565C0;background:#E3F2FD">${g.product_name}（${g.display_name?g.display_name+'様':''}）</td>`;
    const priceCell = `<td style="background:#E3F2FD;color:var(--text2);white-space:nowrap;${priceAlign}">¥${g.price.toLocaleString()}</td>`;
    let tailCells;
    if (mode === 'report') {
      tailCells = `<td class="text-right fw-bold" style="background:#F5F5F5">${g.quantity||'―'}</td>
        <td class="text-right fw-bold" style="background:#F0F7F0">${amt?fmt(amt):'―'}</td>`;
    } else {
      tailCells = `<td class="fw-bold text-center" style="background:#F0F7F0">${g.quantity||''}</td>`;
    }
    return `<tr data-bento-row="1" style="background:#E3F2FD">${nameCell}${priceCell}${channelCells}${tailCells}</tr>`;
  }).join('');
}

const FALLBACK_CATS = ['弁当','寿司','惣菜','その他'];
const FALLBACK_SUBS = {'弁当':['白米','三色','ちらし','炊き込み'],
                       '惣菜':['煮物','酢もの','サラダ','魚','天ぷら','漬物','和え物','揚げ物','その他']};
function getCatOrder() {
  return cachedCategories.length

    : FALLBACK_CATS;
}
function getSubcats(catName) {
  if (cachedCategories.length) {
    const cat = cachedCategories.find(c=>c.name===catName);
    if (!cat) return [];
    return cachedSubcategories.filter(s=>s.category_id===cat.id).map(s=>s.name);
  }
  return FALLBACK_SUBS[catName] || [];
}

function fmt(n) { return Math.round(n||0).toLocaleString(); }

const REDUCED_TAX_RATE = 1.08;
function excludeTax(taxIncluded) { return Math.round((taxIncluded||0) / REDUCED_TAX_RATE); }

function getMondayOf(dateStr) {
  const dt = new Date(dateStr);
  const dow = dt.getDay()===0 ? 6 : dt.getDay()-1;
  const m = new Date(dt); m.setDate(dt.getDate()-dow);
  return m.toISOString().slice(0,10);
}

function getWeekDays(mondayStr) {
  return Array.from({length:6},(_,i)=>{
    const d=new Date(mondayStr); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10);
  });
}

// ═══════════════════════════════════════════════
// 出荷指示書（マトリクス表示）
// 行：商品　列：出荷先　モード切替：一日 / 週間
// ═══════════════════════════════════════════════
let planViewMode = 'day'; // 'day' | 'week'

async function renderPlanPage() {
  setLoading();
  const mondayStr = getMondayOf(currentDate);
  const days = getWeekDays(mondayStr);
  const DOW = ['月','火','水','木','金','土'];
  const todayDow = (() => { const dt=new Date(currentDate); return dt.getDay()===0?5:dt.getDay()-1; })();
  const todayDate = days[todayDow] || days[0];
  const todayLabel = todayDate.slice(5).replace('-','/');

  const plans = await fetch(`${API}/shipping-plans?date_from=${days[0]}&date_to=${days[5]}`).then(r=>r.json()).catch(()=>[]);
  await loadBentoOrders(todayDate);
  await loadInstoreOrders(todayDate);

  // planMap[date][product_id][channel_id] = qty
  const planMap = {};
  days.forEach(d => planMap[d]={});
  plans.forEach(p => {
    if(!planMap[p.date]) planMap[p.date]={};
    if(!planMap[p.date][p.product_id]) planMap[p.date][p.product_id]={};
    planMap[p.date][p.product_id][p.channel_id] = p.planned_qty;
  });

  const prods = cachedProducts;
  const chs   = cachedChannels;

  // ── 一日マトリクス ──────────────────────────────
  // 行：商品　列：出荷先（西店・南店・市場・空港・医師会・NPO・合計）
  function buildDayMatrix(targetDate) {
    const chHeader = chs.map(ch=>`<th style="min-width:58px">${ch.name}</th>`).join('') + '<th style="min-width:52px;background:#E8F0E8">合計</th>';

    const catOrder = getCatOrder();
    const planColspan = 2+chs.length+1;
    let body = '';
    catOrder.forEach(cat => {
      const catProds = prods.filter(p=>p.category===cat);
      if (!catProds.length) return;
      body += `<tr><td class="fw-bold" colspan="${planColspan}" style="background:var(--accent-light);color:var(--accent);font-size:11px;padding:3px 10px;text-align:left">▶ ${cat}</td></tr>`;
      catProds.forEach(p => {
        const cells = chs.map(ch => {
          const v = planMap[targetDate]?.[p.id]?.[ch.id] || 0;
          return `<td><input type="number" min="0" value="${v}" data-date="${targetDate}" data-pid="${p.id}" data-cid="${ch.id}" style="width:64px" oninput="updateRowTotal(this)" onchange="dirty=true"></td>`;
        }).join('');
        const rowTotal = chs.reduce((s,ch)=>s+(planMap[targetDate]?.[p.id]?.[ch.id]||0),0);
        body += `<tr>
          <td class="left" style="white-space:nowrap">${p.name}</td>
          <td style="color:var(--text3);font-size:16px;white-space:nowrap">¥${p.price.toLocaleString()}</td>
          ${cells}
          <td class="fw-bold" style="background:#F0F7F0" id="rt_${p.id}_${targetDate}">${rowTotal||''}</td>
        </tr>`;
      });
      if (cat === orderRowsCat()) {
        // dx 店頭注文 + bento 注文を対象カテゴリ末尾に行追加（read-only）
        body += buildInstoreOrderRows(chs, 'plan');
        body += buildBentoOrderRows(chs, 'plan');
      }
    });

    // 列合計行（dx 注文・bento 注文も加算）
    const deliveryCh    = chs.find(c => c.name === '配達');
    const deliveryChId  = deliveryCh ? deliveryCh.id : null;
    const instoreColSum = ch => cachedInstoreOrders.filter(o=>o.store_id===ch.id).reduce((s,o)=>s+(o.quantity||0),0);
    const bentoColSum   = ch => (deliveryChId !== null && ch.id === deliveryChId)
      ? cachedBentoOrders.reduce((s,o)=>s+(o.quantity||0),0) : 0;
    const colTotals = chs.map(ch=>{
      const t = prods.reduce((s,p)=>s+(planMap[targetDate]?.[p.id]?.[ch.id]||0),0) + instoreColSum(ch) + bentoColSum(ch);
      return `<td class="fw-bold" style="background:#E8F0E8" id="ct_${ch.id}_${targetDate}">${t||''}</td>`;
    }).join('');
    const grandTotal = chs.reduce((s,ch)=>s+prods.reduce((ss,p)=>ss+(planMap[targetDate]?.[p.id]?.[ch.id]||0),0),0)
                     + cachedInstoreOrders.reduce((s,o)=>s+(o.quantity||0),0)
                     + cachedBentoOrders.reduce((s,o)=>s+(o.quantity||0),0);
    body += `<tr style="background:var(--surface2)">
      <td class="fw-bold left" colspan="2" style="font-size:12px">合　計</td>
      ${colTotals}
      <td class="fw-bold" style="background:#D4EDDA">${grandTotal||''}</td>
    </tr>`;

    return `
      <thead><tr>
        <th style="min-width:130px;text-align:left">品名</th>
        <th style="min-width:56px">価格</th>
        ${chHeader}
      </tr></thead>
      <tbody>${body}</tbody>`;
  }

  // ── 週間マトリクス ──────────────────────────────
  // 行：商品　列：月〜土（各曜日に出荷先をグループ化）
  function buildWeekMatrix() {
    // ヘッダー：1行目＝曜日グループ、2行目＝出荷先
    const dayHeaders1 = days.map((d,i)=>{
      const dt=new Date(d);
      const isToday = d===currentDate;
      return `<th colspan="${chs.length}" style="${isToday?'background:#D4EDDA':''};border-left:2px solid var(--border)">${(dt.getMonth()+1)}/${dt.getDate()}（${DOW[i]}）</th>`;
    }).join('');
    const dayHeaders2 = days.map(d=>
      chs.map(ch=>{
        const isToday = d===currentDate;
        return `<th style="font-size:16px;font-weight:500;${isToday?'background:#EBF7EC':''};border-left:${ch===chs[0]?'2px':'1px'} solid var(--border)">${ch.name}</th>`;
      }).join('')
    ).join('');

    const catOrder = getCatOrder();
    let body = '';
    catOrder.forEach(cat => {
      const catProds = prods.filter(p=>p.category===cat);
      if (!catProds.length) return;
      body += `<tr><td class="fw-bold" colspan="${1+days.length*chs.length}" style="background:var(--accent-light);color:var(--accent);font-size:11px;padding:3px 10px;text-align:left">▶ ${cat}</td></tr>`;
      catProds.forEach(p => {
        const cells = days.map(d=>
          chs.map(ch=>{
            const v = planMap[d]?.[p.id]?.[ch.id]||0;
            const isToday = d===currentDate;
            return `<td style="${isToday?'background:#FFFDE7':''}${ch===chs[0]?';border-left:2px solid var(--border)':''}">
              <input type="number" min="0" value="${v}" data-date="${d}" data-pid="${p.id}" data-cid="${ch.id}" style="width:44px;font-size:16px;padding:2px 1px" onchange="dirty=true">
            </td>`;
          }).join('')
        ).join('');
        body += `<tr><td class="left" style="white-space:nowrap;font-size:16px">${p.name}</td>${cells}</tr>`;
      });
    });

    return `
      <thead>
        <tr><th rowspan="2" style="min-width:120px;text-align:left">品名</th>${dayHeaders1}</tr>
        <tr>${dayHeaders2}</tr>
      </thead>
      <tbody>${body}</tbody>`;
  }

  // 出荷指示書(plan)は常に一日表示・週切替なし、週間予定数入力(adminplan)は週/日切替可
  const isAdmin = currentPage === 'adminplan';
  const isDayMode = isAdmin ? planViewMode === 'day' : true;
  const tableContent = isDayMode ? buildDayMatrix(todayDate) : buildWeekMatrix();
  const pageTitle = isAdmin ? '週間予定数入力' : '出荷指示書';


  document.getElementById('content').innerHTML = `
    <div class="print-header"><h2>${pageTitle}</h2><p>${todayDate}（${DOW[todayDow]}）　みかわ 惣菜部</p></div>
    <div class="print-only">
      ${calcChipsPrint()}
    </div>

      <button class="btn btn-secondary btn-sm" onclick="shiftPlanWeek(7)">次の週へ ▶</button>` : ''}

        <button class="btn btn-sm ${isDayMode?'btn-primary':'btn-secondary'}" style="padding:3px 12px" onclick="planViewMode='day';renderPlanPage()">一日</button>
        <button class="btn btn-sm ${!isDayMode?'btn-primary':'btn-secondary'}" style="padding:3px 12px" onclick="planViewMode='week';renderPlanPage()">週間</button>
      </div>` : ''}

      <div style="margin-left:auto;display:flex;gap:8px">
        ${isAdmin ? `<button class="btn btn-secondary btn-sm" onclick="copyLastWeek('${days[0]}')">📋 前の週の予定をコピー</button>` : ''}
        ${isAdmin ? '' : `<button class="btn btn-warn btn-sm" onclick="saveAndGoToActual('${todayDate}')">✏️ ${todayLabel}の実績入力へ（保存して移動）</button>`}
        <button class="btn btn-secondary btn-sm" onclick="window.print()">🖨 ${todayLabel}を印刷</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header no-print">
        <span class="card-title">${isDayMode ? todayDate+'（'+DOW[todayDow]+'）の出荷計画' : '週間出荷計画　'+mondayStr+' 週'}</span>
        <span class="text-muted" style="font-size:12px">行：商品　列：出荷先${isDayMode?'（合計自動計算）':''}</span>
      </div>
      <div class="table-wrap">
        <table id="plan-table">${tableContent}</table>
      </div>
    </div>
  `;
  updateRiceCalc();
}

// 計算チップ（部署別）。弁当=炊飯量/三色等、餅=白/よもぎ/きび/升もち、漬物=なし。
function calcChipsScreen() {
  const chip = (bg,bd,label,id) => `<div style="background:${bg};border:1px solid ${bd};border-radius:6px;padding:6px 14px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px">${label}：<span id="${id}">―</span></div>`;
  if (currentDept === 'mochi') {
    return chip('#FFFFFF','#9E9E9E','⚪ 白','mochi-white-calc')
         + chip('#E8F5E9','#388E3C','🟢 よもぎ','mochi-yomogi-calc')
         + chip('#FFF8E1','#FFB300','🟡 きび','mochi-kibi-calc')
         + chip('#EFEBE9','#5D4037','🎂 升もち','mochi-masu-calc');
  }
  if (currentDept !== 'bento') return '';   // 漬物など：計算チップなし
  return chip('#FFF9C4','#F9A825','🍚 炊飯量','rice-calc')
       + chip('#E8F4E9','#3B6E3F','三色','sansyoku-calc')
       + chip('#FCE4EC','#E91E63','ちらし','chirashi-calc')
       + chip('#FFF8E1','#FF8F00','🥚 玉子','tamago-calc')
       + chip('#E8F5E9','#388E3C','サラダ','bento-calc')
       + chip('#FBE9E7','#BF360C','天ぷら','tenpura-calc')
       + chip('#EFEBE9','#5D4037','煮しめ','nishime-calc')
       + chip('#EDE7F6','#5E35B1','🍣 助六','sukoroku-calc');
}
function calcChipsPrint() {
  const sp = (label,id) => `<span>${label}：<strong id="${id}">―</strong></span>`;
  if (currentDept === 'mochi') {
    return sp('⚪ 白','mochi-white-calc-p')+sp('🟢 よもぎ','mochi-yomogi-calc-p')+sp('🟡 きび','mochi-kibi-calc-p')+sp('🎂 升もち','mochi-masu-calc-p');
  }
  if (currentDept !== 'bento') return '';
  return sp('🍚 炊飯量','rice-calc-p')+sp('三色','sansyoku-calc-p')+sp('ちらし','chirashi-calc-p')+sp('🥚 玉子','tamago-calc-p')+sp('サラダ','bento-calc-p')+sp('天ぷら','tenpura-calc-p')+sp('煮しめ','nishime-calc-p')+sp('🍣 助六','sukoroku-calc-p');
}

// 餅部：白/よもぎ/きび（32個=1升）と 升もち（1升=1.0/7合=0.7/5合=0.5/3合=0.3）を集計。
function updateMochiCalc() {
  const sizeSho = name => {
    if (/一升|1升|１升/.test(name)) return 1.0;
    if (/七合|7合|７合/.test(name)) return 0.7;
    if (/五合|5合|５合/.test(name)) return 0.5;
    if (/三合|3合|３合/.test(name)) return 0.3;
    return 0;
  };
  const colorOf = name =>
    name.includes('よもぎ') ? 'yomogi' :
    name.includes('きび')   ? 'kibi'   :
    name.includes('白')     ? 'white'  : null;
  const prodById = {};
  cachedProducts.forEach(p => { prodById[p.id] = p; });
  let white=0, yomogi=0, kibi=0, masu=0;
  document.querySelectorAll('input[type="number"][data-pid][data-cid]').forEach(inp => {
    const p = prodById[parseInt(inp.dataset.pid)];
    if (!p) return;
    const v = parseInt(inp.value) || 0;
    if (!v) return;
    const name = p.name || '';
    const sho = sizeSho(name);
    if (sho > 0) { masu += v * sho; return; }   // 升もち（升単位で加算）
    const c = colorOf(name);
    if (c === 'white')  white  += v;
    else if (c === 'yomogi') yomogi += v;
    else if (c === 'kibi')   kibi   += v;
    // 上記以外は計算に入れない
  });
  const fmtColor = cnt => cnt > 0 ? `${cnt}個・${(cnt/32).toFixed(2)}升` : '―';
  const set = (id,val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  const out = {
    'mochi-white-calc':  fmtColor(white),
    'mochi-yomogi-calc': fmtColor(yomogi),
    'mochi-kibi-calc':   fmtColor(kibi),
    'mochi-masu-calc':   masu > 0 ? `${masu.toFixed(1)}升` : '―',
  };
  Object.entries(out).forEach(([id,v]) => { set(id,v); set(id+'-p',v); });
}

// 各種合計をリアルタイム更新（部署で振り分け）
function updateRiceCalc() {
  if (currentDept === 'mochi') { updateMochiCalc(); return; }
  if (currentDept !== 'bento') return;   // 漬物など：計算なし
  const ricePids     = new Set(cachedProducts.filter(p=>p.subcategory==='白米').map(p=>p.id));
  const sansyokuPids = new Set(cachedProducts.filter(p=>p.subcategory==='三色').map(p=>p.id));
  const chirashiPids = new Set(cachedProducts.filter(p=>
    p.subcategory==='ちらし' || p.name.includes('ちらし寿司')
  ).map(p=>p.id));
  const tamagoPids   = new Set(cachedProducts.filter(p=>
    p.category==='弁当' &&
    (p.name.includes('デラックス') || (Number(p.price)||0) >= 800)
  ).map(p=>p.id));
  const saladPids    = new Set(cachedProducts.filter(p=>p.subcategory==='サラダ').map(p=>p.id));
  const bentoPids    = new Set(cachedProducts.filter(p=>
    p.category==='弁当' || p.name.includes('おかずセット')
  ).map(p=>p.id));
  const tenpuraPids  = new Set(cachedProducts.filter(p=>
    (p.category==='弁当' && !p.name.includes('1500') && !p.name.includes('2000') && !p.name.includes('2500')) ||
    p.name.includes('おかずセット')
  ).map(p=>p.id));
  const nishimePids  = new Set(cachedProducts.filter(p=>
    p.category==='弁当' && (Number(p.price)||0) >= 1500
  ).map(p=>p.id));
  const sukorokuPids = new Set(cachedProducts.filter(p=>
    (p.category==='弁当' || p.category==='寿司') && p.name.includes('助六')
  ).map(p=>p.id));

  let riceTotal=0, sansyokuTotal=0, chirashiTotal=0, tamagoTotal=0, saladTotal=0, bentoTotal=0, tenpuraTotal=0, nishimeTotal=0, sukorokuTotal=0;
  document.querySelectorAll('input[type="number"][data-pid][data-cid]').forEach(inp => {
    const pid = parseInt(inp.dataset.pid);
    const v   = parseInt(inp.value) || 0;
    if (!v) return;
    // 助六：他には一切加算せず、助六チップにのみ計上
    if (sukorokuPids.has(pid)) { sukorokuTotal += v; return; }
    if (ricePids.has(pid))     riceTotal     += v;
    if (sansyokuPids.has(pid)) sansyokuTotal += v;
    if (chirashiPids.has(pid)) chirashiTotal += v;
    if (tamagoPids.has(pid))   tamagoTotal   += v;
    if (saladPids.has(pid))    saladTotal    += v;
    if (bentoPids.has(pid))    bentoTotal    += v;
    if (tenpuraPids.has(pid))  tenpuraTotal  += v;
    if (nishimePids.has(pid))  nishimeTotal  += v;
  });
  // dx 店頭注文 + bento 注文：master 参照せず product_name の文字列パターンから直接分類（ヒューリスティック）
  const classifyOrder = o => {
    const name  = o.product_name || '';
    const cat   = o.category     || '弁当';
    const v     = Math.round(o.quantity || 0);
    const price = Math.round(Number(o.price) || 0);
    if (!v) return;
    // 助六：他には一切加算せず、助六チップにのみ計上
    if (name.includes('助六')) { sukorokuTotal += v; return; }
    // 取込品の単価が500円未満は何も加算しない（500円ちょうどは加算対象）
    if (price < 500) return;
    const isSansyoku = name.includes('三色');
    const isChirashi = name.includes('ちらし') || name.includes('色彩');
    const isBento    = cat === '弁当' || name.includes('おかずセット');
    const hasBigSize = name.includes('1500') || name.includes('2000') || name.includes('2500');
    if (isSansyoku) sansyokuTotal += v;
    else if (isChirashi) chirashiTotal += v;
    else if (cat === '弁当') riceTotal += v;  // 三色/ちらし以外の弁当は白米扱い
    if (cat === '弁当' && (name.includes('デラックス') || price >= 800)) {
      tamagoTotal += v;
    }
    if (isBento) saladTotal += v;  // サラダは弁当 count と同じ条件
    if (isBento) bentoTotal += v;
    if ((cat === '弁当' && !hasBigSize) || name.includes('おかずセット')) tenpuraTotal += v;
    if (cat === '弁当' && price >= 1500) {
      nishimeTotal += v;
    }
  };
  cachedInstoreOrders.forEach(classifyOrder);
  cachedBentoOrders.forEach(classifyOrder);

  function toSho(n) { return Math.ceil(n * 185 / 3600 * 10) / 10; }
  function set(id, val) { const el=document.getElementById(id); if(el) el.textContent=val; }

  const vals = {
    'rice-calc':     riceTotal     > 0 ? toSho(riceTotal).toFixed(1)+'升' : '―',
    'sansyoku-calc': sansyokuTotal > 0 ? sansyokuTotal+'個' : '―',
    'chirashi-calc': chirashiTotal > 0 ? chirashiTotal+'個・'+toSho(chirashiTotal).toFixed(1)+'升' : '―',
    'tamago-calc':   tamagoTotal   > 0 ? tamagoTotal+'個' : '―',
    'bento-calc':    bentoTotal    > 0 ? bentoTotal+'個' : '―',
    'tenpura-calc':  tenpuraTotal  > 0 ? tenpuraTotal+'個' : '―',
    'nishime-calc':  nishimeTotal  > 0 ? nishimeTotal+'個' : '―',
    'sukoroku-calc': sukorokuTotal > 0 ? sukorokuTotal+'個' : '―',
  };
  Object.entries(vals).forEach(([id, v]) => { set(id, v); set(id+'-p', v); });
}

// 行合計・列合計をリアルタイム更新
function updateRowTotal(inp) {
  dirty = true;
  const pid = inp.dataset.pid;
  const date = inp.dataset.date;
  // 行合計
  const rowInputs = document.querySelectorAll(`#plan-table input[data-pid="${pid}"][data-date="${date}"]`);
  const rowSum = Array.from(rowInputs).reduce((s,el)=>s+(parseInt(el.value)||0),0);
  const rtEl = document.getElementById(`rt_${pid}_${date}`);
  if (rtEl) rtEl.textContent = rowSum || '';
  // 列合計（dx 店頭注文・bento 注文も加算）
  const cid = inp.dataset.cid;
  const colInputs = document.querySelectorAll(`#plan-table input[data-cid="${cid}"][data-date="${date}"]`);
  const colInputSum = Array.from(colInputs).reduce((s,el)=>s+(parseInt(el.value)||0),0);
  const dxSum = cachedInstoreOrders.filter(o=>o.store_id===+cid).reduce((s,o)=>s+(o.quantity||0),0);
  const chsForLookup = cachedChannels;
  const deliveryCh   = chsForLookup.find(c => c.name === '配達');
  const bentoSum     = (deliveryCh && deliveryCh.id === +cid)
    ? cachedBentoOrders.reduce((s,o)=>s+(o.quantity||0),0) : 0;
  const ctEl = document.getElementById(`ct_${cid}_${date}`);
  if (ctEl) ctEl.textContent = (colInputSum+dxSum+bentoSum) || '';
  updateRiceCalc();
}

let dirty = false;

// reflectDate を渡すと、計画保存後にその日の出荷実績入力へ数を反映する（空欄のみ補完・手入力は残す）。
// 出荷指示書（調整保存）から呼ばれる。週間予定数入力(adminplan)からは引数なしで保存のみ。
async function savePlans(reflectDate) {
  const inputs = document.querySelectorAll('#plan-table input[type="number"]');
  const items = [];
  const dateSet = new Set();
  inputs.forEach(inp => {
    dateSet.add(inp.dataset.date);
    const v = parseInt(inp.value) || 0;
    if (v > 0) items.push({date:inp.dataset.date, product_id:+inp.dataset.pid, channel_id:+inp.dataset.cid, planned_qty:v});
  });
  const r = await fetch(`${API}/shipping-plans/bulk`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({dates:[...dateSet], items})}).then(r=>r.json()).catch(()=>null);
  if (!r?.ok) { showToast('保存失敗',true); return false; }
  dirty=false;
  if (reflectDate) {
    await fetch(`${API}/shipping-actuals/init`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({date:reflectDate, only_empty:true})}).then(r=>r.json()).catch(()=>{});
    showToast(`${items.length}件保存し、実績入力へ反映しました`);
  } else {
    showToast(`${items.length}件保存しました`);
  }
  return true;
}

// 出荷指示書の「実績入力へ」ボタン：計画を保存→その日の実績へ反映（空欄のみ補完）→実績入力画面へ遷移。
async function saveAndGoToActual(date) {
  const ok = await savePlans(date);
  if (!ok) return;            // 保存失敗時は遷移しない
  document.getElementById('global-date').value = date;
  currentDate = date;
  showPage('actual');
}

async function copyLastWeek(dstFrom) {
  const dst=new Date(dstFrom), src=new Date(dst);
  src.setDate(dst.getDate()-7);
  const srcEnd=new Date(src); srcEnd.setDate(src.getDate()+5);
  const r = await fetch(`${API}/shipping-plans/week-copy`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({src_from:src.toISOString().slice(0,10),src_to:srcEnd.toISOString().slice(0,10),dst_from:dstFrom})
  }).then(r=>r.json()).catch(()=>null);
  if (r?.ok) { showToast(`${r.copied}件コピーしました`); renderPlanPage(); }
  else showToast('コピー失敗',true);
}

function shiftPlanWeek(deltaDays) {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + deltaDays);
  const next = d.toISOString().slice(0, 10);
  currentDate = next;
  document.getElementById('global-date').value = next;
  renderPlanPage();
}

async function goToActual(date) {
  // その日の実績がまだ無ければ、出荷予定(planned_qty)から実績を初期生成する。
  // 既に入力済みの実績がある場合は上書きしない（再ログイン/再表示で消さない）。
  const existing = await fetch(`${API}/shipping-actuals?date=${date}`).then(r=>r.json()).catch(()=>[]);
  const hasActuals = Array.isArray(existing) && existing.some(r => (r.actual_qty||0) > 0);
  if (!hasActuals) {
    await fetch(`${API}/shipping-actuals/init`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date})}).then(r=>r.json()).catch(()=>{});
  }
  document.getElementById('global-date').value = date;
  currentDate = date;
  showPage('actual');
}

// ═══════════════════════════════════════════════
// 出荷実績入力（マトリクス表示）
// ═══════════════════════════════════════════════
async function renderActualPage() {
  setLoading();
  const date = currentDate;
  const mondayStr = getMondayOf(date);
  const [actuals, shifts, shiftPlans, menus, savedInfo] = await Promise.all([
    fetch(`${API}/shipping-actuals?date=${date}`).then(r=>r.json()).catch(()=>[]),
    fetch(`${API}/shifts?date=${date}`).then(r=>r.json()).catch(()=>[]),
    fetch(`${API}/shift-plans?date=${date}`).then(r=>r.json()).catch(()=>[]),
    fetch(`${API}/weekly-menus?week_start=${mondayStr}`).then(r=>r.json()).catch(()=>[]),
    fetch(`${API}/daily-reports/${date}`).then(r=>r.json()).catch(()=>null)
  ]);
  await loadBentoOrders(date);
  await loadInstoreOrders(date);

  // 当日の献立から商品IDを取得
  const dow = new Date(date).getDay() || 7; // 日=7(対象外), 月=1〜土=6
  const todayMenuNames = new Set(
    menus.filter(m=>m.day_of_week===dow && m.menu_name).map(m=>m.menu_name)
  );
  const menuPids = new Set(
    cachedProducts.filter(p=>todayMenuNames.has(p.name)).map(p=>p.id)
  );

  const prods = cachedProducts;
  const chs   = cachedChannels;

  const actualMap = {};
  const priceMap  = {};
  actuals.forEach(r=>{
    if(!actualMap[r.product_id]) actualMap[r.product_id]={};
    actualMap[r.product_id][r.channel_id]=r.actual_qty||0;
    if (r.actual_qty>0 && priceMap[r.product_id]===undefined) {
      priceMap[r.product_id] = Math.round(r.actual_amount/r.actual_qty);
    }
  });

  const activePids = new Set([...actuals.map(r=>r.product_id), ...menuPids]);
  const activeProds = prods.filter(p=>activePids.has(p.id));
  const notShownProds = prods.filter(p=>p.active && !activePids.has(p.id));

  const chHeader = '<th style="min-width:80px;font-size:18px">単価</th>' +
    chs.map(ch=>`<th style="min-width:96px;font-size:20px">${ch.name}</th>`).join('') +
    '<th style="min-width:72px;background:#E8F0E8;font-size:20px">合計</th>';

  const catOrder = getCatOrder();
  const actualColspan = 2+chs.length+1;
  let tableBody = '';
  catOrder.forEach(cat => {
    const catProds = activeProds.filter(p=>p.category===cat);
    if (!catProds.length) return;
    tableBody += `<tr><td class="fw-bold" colspan="${actualColspan}" style="background:var(--accent-light);color:var(--accent);font-size:11px;padding:3px 10px;text-align:left">▶ ${cat}</td></tr>`;
    catProds.forEach(p => {
      const cells = chs.map(ch => {
        const actual = actualMap[p.id]?.[ch.id]||0;
        return `<td style="padding:3px 5px">
          <input type="number" min="0" value="${actual||''}" placeholder="0"
            data-pid="${p.id}" data-cid="${ch.id}"
            style="width:80px;font-size:20px;text-align:center;padding:4px 2px"
            oninput="updateActualTotals(this)">
        </td>`;
      }).join('');
      const actualTotal = chs.reduce((s,ch)=>s+(actualMap[p.id]?.[ch.id]||0),0);
      const unitPrice = priceMap[p.id] ?? p.price;
      tableBody += `<tr>
        <td class="left" style="white-space:nowrap;font-weight:500;font-size:20px">${p.name}</td>
        <td style="padding:3px 5px;background:#FFFDE7">
          <input type="number" min="0" value="${unitPrice}" data-pid="${p.id}" class="unit-price"
            title="本日の単価（マスタは変更されません）"
            style="width:72px;font-size:18px;text-align:right;padding:4px 2px"
            onchange="dirty=true">
        </td>
        ${cells}
        <td class="fw-bold" style="background:#F0F7F0;text-align:center" id="at_${p.id}">${actualTotal||''}</td>
      </tr>`;
    });
    if (cat === orderRowsCat()) {
      // dx 店頭注文 + bento 注文を対象カテゴリ末尾に行追加（read-only）
      tableBody += buildInstoreOrderRows(chs, 'actual');
      tableBody += buildBentoOrderRows(chs, 'actual');
    }
  });

  const deliveryChAct   = chs.find(c => c.name === '配達');
  const deliveryChIdAct = deliveryChAct ? deliveryChAct.id : null;
  const instoreColSum = ch => cachedInstoreOrders.filter(o=>o.store_id===ch.id).reduce((s,o)=>s+(o.quantity||0),0);
  const bentoColSum   = ch => (deliveryChIdAct !== null && ch.id === deliveryChIdAct)
    ? cachedBentoOrders.reduce((s,o)=>s+(o.quantity||0),0) : 0;
  const actColTotals = chs.map(ch=>prods.reduce((s,p)=>s+(actualMap[p.id]?.[ch.id]||0),0) + instoreColSum(ch) + bentoColSum(ch));
  const actGrand = actColTotals.reduce((s,v)=>s+v,0);

  tableBody += `
    <tr style="background:#E8F7E8" data-total-row="1">
      <td class="fw-bold left">合　計</td>
      <td></td>
      ${chs.map((_,i)=>`<td class="text-center fw-bold" id="ct_actual_${chs[i].id}">${actColTotals[i]||''}</td>`).join('')}
      <td class="text-center fw-bold" style="background:#D4EDDA" id="grand_actual">${actGrand||''}</td>
    </tr>
  `;

  // シフト（予定+実績）
  const wageMap = {}; cachedMembers.forEach(m=>wageMap[m.name]=m.hourly_wage);
  const shiftMap = {}; shifts.forEach(s=>shiftMap[s.member_name]=s.hours);

  // 予定あり or 実績あるメンバーを表示

  // 実績未保存のメンバーは予定の時間数を初期値として表示
  const shiftRows = displayNames.map(n => {
    const initialHours = (n in shiftMap) ? shiftMap[n] : (planMap[n] || '');

  // ドロップダウン：上記以外のマスタメンバー
  const dropdownOpts = cachedMembers

       </div>`
    : '';

  document.getElementById('content').innerHTML = `
    ${finalizedBanner}
    <div class="no-print btn-group mb-16">
      <button class="btn btn-primary" onclick="saveActuals('${date}')" ${isFinalized?'disabled title="確定済みのため変更不可"':''}>💾 実績・シフトを保存</button>
      <button class="btn btn-warn"    onclick="generateReport('${date}')" ${isFinalized?'disabled title="確定済みのため再生成不可"':''}>📊 日報を生成する</button>
      ${calcChipsScreen()}
      <span class="text-muted" style="font-size:12px;align-self:center">${date}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start">
      <div class="card">
        <div class="card-header">
          <span class="card-title">出荷実績入力　${date}</span>
          <div class="no-print" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <select id="add-prod-select" style="font-size:14px;min-height:36px">
              <option value="">― 商品を追加 ―</option>
              ${notShownProds.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}
            </select>
            <button class="btn btn-secondary btn-sm" onclick="addActualProductRow()">＋ 追加</button>
            <button class="btn btn-primary btn-sm" onclick="openNewProductDialog()" ${isFinalized?'disabled':''}>✚ 新規商品</button>
          </div>
        </div>
        <div class="table-wrap">
          <table id="actual-table">
            <thead><tr>
              <th style="text-align:left;min-width:120px">品名</th>
              ${chHeader}
            </tr></thead>
            <tbody>${tableBody}</tbody>
          </table>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-header"><span class="card-title">シフト</span></div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 36px 56px 36px 28px;gap:4px;font-size:11px;color:var(--text3);padding:2px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px">
              <span>名前</span><span style="text-align:right">予定</span><span style="text-align:center">実績</span><span style="text-align:center">差</span><span></span>
            </div>
            <div class="shift-list" id="shift-list">${shiftRows||'<div style="color:var(--text3);font-size:12px;padding:4px 0">メンバーを追加してください</div>'}</div>
            <div class="divider"></div>
            <div class="flex gap-8 items-center">
              <select id="member-select" style="flex:1;font-size:13px">
                <option value="">― メンバーを選択 ―</option>

// マトリクス実績：行合計・列合計をリアルタイム更新
function updateActualTotals(inp) {
  const pid = inp.dataset.pid;
  const cid = inp.dataset.cid;

  // 行合計
  const rowInputs = document.querySelectorAll(`table input[data-pid="${pid}"][data-cid]`);
  const rowActual = Array.from(rowInputs).reduce((s,el)=>s+(parseInt(el.value)||0),0);
  const atEl = document.getElementById(`at_${pid}`);
  if (atEl) atEl.textContent = rowActual||'';

  // 列合計（dx 店頭注文・bento 注文も加算）
  const colInputs = document.querySelectorAll(`table input[data-cid="${cid}"]`);
  const colInputSum = Array.from(colInputs).reduce((s,el)=>s+(parseInt(el.value)||0),0);
  const colDxSum = cachedInstoreOrders.filter(o=>o.store_id===+cid).reduce((s,o)=>s+(o.quantity||0),0);
  const deliveryChU   = cachedChannels.find(c => c.name === '配達');
  const colBentoSum   = (deliveryChU && deliveryChU.id === +cid)
    ? cachedBentoOrders.reduce((s,o)=>s+(o.quantity||0),0) : 0;
  const ctEl = document.getElementById(`ct_actual_${cid}`);
  if (ctEl) ctEl.textContent = (colInputSum+colDxSum+colBentoSum)||'';

  // 全体合計（dx 店頭注文・bento 注文も加算）
  const allInputs = document.querySelectorAll('table input[data-pid][data-cid]');
  const grandInput = Array.from(allInputs).reduce((s,el)=>s+(parseInt(el.value)||0),0);
  const grandDx    = cachedInstoreOrders.reduce((s,o)=>s+(o.quantity||0),0);
  const grandBento = cachedBentoOrders.reduce((s,o)=>s+(o.quantity||0),0);
  const gaEl = document.getElementById('grand_actual');
  if (gaEl) gaEl.textContent = (grandInput+grandDx+grandBento)||'';
  updateRiceCalc();
}

function buildShiftRowHTML(name, hours, wage, plannedHours) {
  plannedHours = plannedHours || 0;
  const actual = parseFloat(hours) || 0;
  const hasActual = hours !== '' && hours !== undefined;
  const diff = hasActual ? actual - plannedHours : null;
  const diffStr  = diff === null ? '' : diff === 0 ? '±0' : diff > 0 ? `+${diff}` : `${diff}`;
  const diffColor = diff < 0 ? 'var(--danger)' : diff > 0 ? 'var(--warn)' : 'var(--text3)';
  return `<div class="shift-row" data-member="${name}" style="display:grid;grid-template-columns:1fr 36px 56px 36px 28px;gap:4px;align-items:center">
    <span style="font-size:13px;white-space:nowrap;overflow:hidden">${name}</span>
    <span style="font-size:12px;color:var(--text3);text-align:right">${plannedHours||'―'}</span>
    <input type="number" min="0" max="24" step="0.5" value="${hours!==undefined&&hours!==''?hours:''}" placeholder="―"
      style="width:56px;text-align:center" data-member="${name}" data-wage="${wage}" data-planned="${plannedHours}" class="shift-hr" oninput="updateShiftDiff(this)">
    <span class="shift-diff" style="font-size:12px;text-align:center;color:${diffColor}">${diffStr}</span>
    <button class="btn btn-secondary btn-sm" style="padding:2px 4px;color:var(--danger)" onclick="removeShiftRow(this)">×</button>
  </div>`;
}

function appendActualProductRow(prod) {
  const chs = cachedChannels;
  const cells = chs.map(ch=>`<td style="padding:3px 5px">
    <input type="number" min="0" value="" placeholder="0"
      data-pid="${prod.id}" data-cid="${ch.id}"
      style="width:80px;font-size:20px;text-align:center;padding:4px 2px"
      oninput="updateActualTotals(this)">
  </td>`).join('');
  const priceCell = `<td style="padding:3px 5px;background:#FFFDE7">
    <input type="number" min="0" value="${prod.price}" data-pid="${prod.id}" class="unit-price"
      title="本日の単価（マスタは変更されません）"
      style="width:72px;font-size:18px;text-align:right;padding:4px 2px"
      onchange="dirty=true">
  </td>`;
  const newRow = document.createElement('tr');
  newRow.innerHTML = `<td class="left" style="white-space:nowrap;font-weight:500;font-size:20px">${prod.name}</td>${priceCell}${cells}<td class="fw-bold" style="background:#F0F7F0;text-align:center" id="at_${prod.id}"></td>`;
  const tbody = document.querySelector('#actual-table tbody');
  const totalRow = tbody.querySelector('tr[data-total-row]');
  if (totalRow) tbody.insertBefore(newRow, totalRow);
  else tbody.appendChild(newRow);
  updateRiceCalc();
}

function addActualProductRow() {
  const sel = document.getElementById('add-prod-select');
  const pid = parseInt(sel.value);
  if (!pid) return;
  const prod = cachedProducts.find(p=>p.id===pid);
  if (!prod) return;
  appendActualProductRow(prod);
  sel.querySelector(`option[value="${pid}"]`).remove();
  sel.value = '';
}

  if (existing) existing.remove();

  const catOpts = getCatOrder().map(cat => {

    if (subs.length) {
      return `<optgroup label="${cat}">${subs.map(s=>`<option value="${cat}|${s}">${s}</option>`).join('')}</optgroup>`;

  dialog.innerHTML = `
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px">✚ 新規商品を追加（商品マスタにも保存）</div>
    <div style="padding:16px 18px;display:flex;flex-direction:column;gap:10px">
      <div>
        <label style="display:block;font-size:12px;color:var(--text3);margin-bottom:4px">品名</label>
        <input type="text" id="np-name" placeholder="からあげ" style="width:100%;font-size:14px;padding:6px 8px">
      </div>
      <div>
        <label style="display:block;font-size:12px;color:var(--text3);margin-bottom:4px">価格（円）</label>
        <input type="number" id="np-price" placeholder="200" min="0" style="width:100%;font-size:14px;padding:6px 8px">
      </div>
      <div>
        <label style="display:block;font-size:12px;color:var(--text3);margin-bottom:4px">分類・種別</label>

function closeNewProductDialog() {
  document.getElementById('new-product-dialog')?.close();
}

async function submitNewProductFromActual() {
  const name   = document.getElementById('np-name').value.trim();
  const price  = parseInt(document.getElementById('np-price').value)||0;
  const catVal = document.getElementById('np-cat').value;
  if (!name)   { showToast('品名を入力してください',true); return; }
  if (!catVal) { showToast('分類・種別を選択してください',true); return; }
  if (cachedProducts.some(p=>p.name===name)) {
    showToast('同じ品名がすでに存在します',true); return;
  }
  const [category, subcategory] = catVal.split('|');
  const r = await fetch(`${API}/products`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,price,category,subcategory})}).then(r=>r.json()).catch(()=>null);
  if (!r?.ok) { showToast('追加失敗',true); return; }
  cachedProducts = await fetch(API+'/products').then(r=>r.json());
  const newProd = cachedProducts.find(p=>p.name===name);
  closeNewProductDialog();
  showToast('商品マスタに追加しました');
  if (newProd) {
    appendActualProductRow(newProd);
    const sel = document.getElementById('add-prod-select');
    if (sel) {
      const opt = sel.querySelector(`option[value="${newProd.id}"]`);
      if (opt) opt.remove();
    }
  }
}

function addShiftRowFromMaster() {
  const sel = document.getElementById('member-select');
  const name = sel.value;
  if (!name) return;
  const opt = sel.options[sel.selectedIndex];
  const wage    = parseInt(opt.dataset.wage)    || 0;
  const planned = parseFloat(opt.dataset.planned) || 0;
  const list = document.getElementById('shift-list');
  const placeholder = list.querySelector('div[style]:not([data-member])');
  if (placeholder) placeholder.remove();
  list.insertAdjacentHTML('beforeend', buildShiftRowHTML(name, '', wage, planned));
  rebuildMemberDropdown();
}

function removeShiftRow(btn) {
  btn.closest('.shift-row').remove();
  const list = document.getElementById('shift-list');
  if (!list.querySelector('.shift-row')) {
    list.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:4px 0">メンバーを追加してください</div>';
  }
  rebuildMemberDropdown();
  updateLaborTotal();
}

function rebuildMemberDropdown() {
  const sel = document.getElementById('member-select');
  if (!sel) return;
  const added = new Set(Array.from(document.querySelectorAll('#shift-list .shift-row')).map(r=>r.dataset.member));
  const opts = cachedMembers
    .filter(m=>!added.has(m.name))
    .map(m=>`<option value="${m.name}" data-wage="${m.hourly_wage}" data-planned="0">${m.name}</option>`)
    .join('');
  sel.innerHTML = '<option value="">― メンバーを選択 ―</option>' + opts;
}

function updateShiftDiff(inp) {
  const actual  = parseFloat(inp.value) ?? 0;
  const planned = parseFloat(inp.dataset.planned) || 0;
  const diff    = inp.value !== '' ? actual - planned : null;
  const diffStr = diff === null ? '' : diff === 0 ? '±0' : diff > 0 ? `+${diff}` : `${diff}`;
  const diffEl  = inp.closest('.shift-row')?.querySelector('.shift-diff');
  if (diffEl) {
    diffEl.textContent = diffStr;
    diffEl.style.color = diff < 0 ? 'var(--danger)' : diff > 0 ? 'var(--warn)' : 'var(--text3)';
  }
}

function updateLaborTotal() {
  let total = 0;
  document.querySelectorAll('.shift-hr').forEach(inp => {
    const hours = parseFloat(inp.value) || 0;
    const wage  = parseInt(inp.dataset.wage) || 0;
    const sub   = Math.round(hours * wage);
    total += sub;
    const subEl = inp.closest('.shift-row')?.querySelector('.shift-sub');
    if (subEl) subEl.textContent = sub > 0 ? '¥' + sub.toLocaleString() : '';
  });
  const el = document.getElementById('labor-total');
  if (el) el.textContent = '¥' + total.toLocaleString();
}

async function saveActuals(date) {
  const priceMap = {};
  document.querySelectorAll('input.unit-price').forEach(inp => {
    priceMap[inp.dataset.pid] = parseInt(inp.value)||0;
  });
  const actualItems = [];
  document.querySelectorAll('table input[type="number"][data-pid][data-cid]').forEach(inp => {
    const v = parseInt(inp.value)||0;
    if (v > 0) actualItems.push({date, product_id:+inp.dataset.pid, channel_id:+inp.dataset.cid,
      actual_qty:v, unit_price:priceMap[inp.dataset.pid]});
  });
  const shiftItems = [];
  document.querySelectorAll('.shift-hr').forEach(inp => {
    const h = parseFloat(inp.value)||0;
    if (h>0) shiftItems.push({member_name:inp.dataset.member, hours:h});
  });
  const weather = document.getElementById('inp-weather')?.value || '';
  const note    = document.getElementById('inp-note')?.value || '';
  await Promise.all([
    fetch(`${API}/shipping-actuals/bulk`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({dates:[date], items:actualItems})}).then(r=>r.json()),
    fetch(`${API}/shifts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date,shifts:shiftItems})}).then(r=>r.json()),
    fetch(`${API}/daily-info/${date}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({weather,note})}).then(r=>r.json()),
  ]);
  showToast('実績・シフトを保存しました');
}

async function generateReport(date) {
  await saveActuals(date);
  const weather = document.getElementById('inp-weather')?.value||'';
  const note    = document.getElementById('inp-note')?.value||'';
  const r = await fetch(`${API}/daily-reports/${date}/generate`,{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({weather,note})
  }).then(r=>r.json()).catch(()=>null);
  if (r?.ok) {
    showToast('日報を生成しました');
    document.getElementById('global-date').value = date;
    currentDate = date;
    showPage('report');
  } else showToast('日報生成失敗',true);
}

// ═══════════════════════════════════════════════
// 売上日報
// ═══════════════════════════════════════════════
async function renderReportPage() {
  setLoading();
  const date = currentDate;
  const r = await fetch(`${API}/daily-reports/${date}`).then(res=>res.json()).catch(()=>null);
  await loadBentoOrders(date);
  await loadInstoreOrders(date);

  if (!r || !r.total_sales) {
    document.getElementById('content').innerHTML = `
      <div class="alert alert-warn">${date} の日報データがありません。実績入力から「日報を生成する」してください。</div>
      <button class="btn btn-warn" onclick="showPage('actual')">✏️ 実績入力へ</button>`;
    return;
  }

  const dt=new Date(date);
  const dayLabel='日月火水木金土'[dt.getDay()];

  // 売上マトリクス構築
  const channels   = r.channels || [];
  const details    = r.actuals_detail || [];
  const detailMap  = {};
  const prodInfo   = {};
  details.forEach(d => {
    if (!detailMap[d.product_id]) detailMap[d.product_id] = {};
    detailMap[d.product_id][d.channel_id] = {qty: d.actual_qty, amount: d.actual_amount};
    if (!prodInfo[d.product_id]) {
      prodInfo[d.product_id] = {name: d.product_name, category: d.category, price: d.price};
    }
    if (d.actual_qty > 0) {
      prodInfo[d.product_id].price = Math.round(d.actual_amount / d.actual_qty);
    }
  });
  const catOrder = getCatOrder();
  const allPids  = [...new Set(details.map(d=>d.product_id))];
  allPids.sort((a,b)=>{
    const ca=catOrder.indexOf(prodInfo[a].category), cb=catOrder.indexOf(prodInfo[b].category);
    return ca!==cb ? ca-cb : a-b;
  });
  const chTotals    = {}; channels.forEach(c=>chTotals[c.id]=0);
  const chQtyTotals = {}; channels.forEach(c=>chQtyTotals[c.id]=0);
  let grandTotal = 0, grandQty = 0;
  let matrixBody = '';
  let lastCat = null;
  let bentoVisited = false;
  const reportColspan = 4+channels.length;
  allPids.forEach(pid => {
    const p = prodInfo[pid];
    if (p.category !== lastCat) {
      if (lastCat === '弁当') {
        matrixBody += buildInstoreOrderRows(channels, 'report');
        matrixBody += buildBentoOrderRows(channels, 'report');
      }
      matrixBody += `<tr><td class="fw-bold" colspan="${3+channels.length}" style="background:var(--accent-light);color:var(--accent);font-size:11px;padding:3px 10px;text-align:left">▶ ${p.category}</td></tr>`;
      lastCat = p.category;
      if (p.category === '弁当') bentoVisited = true;
    }
    let rowAmt = 0, rowQty = 0;
    const cells = channels.map(c => {
      const qty = detailMap[pid]?.[c.id]?.qty    || 0;
      const amt = detailMap[pid]?.[c.id]?.amount || 0;
      chTotals[c.id]    += amt;
      chQtyTotals[c.id] += qty;
      rowAmt += amt; rowQty += qty;
      return `<td class="text-right">${qty ? qty : '―'}</td>`;
    }).join('');
    grandTotal += rowAmt; grandQty += rowQty;
    matrixBody += `<tr>
      <td class="left" style="white-space:nowrap">${p.name}</td>
      <td class="text-right" style="color:var(--text2)">¥${fmt(p.price)}</td>
      ${cells}
      <td class="text-right fw-bold" style="background:#F5F5F5">${rowQty || '―'}</td>
      <td class="text-right fw-bold" style="background:#F0F7F0">${rowAmt ? fmt(rowAmt) : '―'}</td>
    </tr>`;
  });
  if (lastCat === '弁当') {
    matrixBody += buildInstoreOrderRows(channels, 'report');
    matrixBody += buildBentoOrderRows(channels, 'report');
  } else if (!bentoVisited && (cachedInstoreOrders.length || cachedBentoOrders.length)) {
    // 当日 master の弁当売上ゼロだが 注文がある場合のフォールバック
    matrixBody += `<tr><td class="fw-bold" colspan="${3+channels.length}" style="background:var(--accent-light);color:var(--accent);font-size:11px;padding:3px 10px;text-align:left">▶ 弁当</td></tr>`;
    matrixBody += buildInstoreOrderRows(channels, 'report');
    matrixBody += buildBentoOrderRows(channels, 'report');
  }

async function finalizeReport(date) {
  if (!confirm(`${date} の日報を確定しますか？\n確定後は数値・明細の変更ができなくなります（天気・メモは変更可）。`)) return;
  const res = await fetch(`${API}/daily-reports/${date}/finalize`,{method:'POST'});
  if (res.ok) {
    showToast('日報を確定しました');
    renderReportPage();
  } else if (res.status === 409) {
    showToast('既に確定済みです', true);
    renderReportPage();
  } else {
    showToast('確定に失敗しました', true);
  }
}

async function unfinalizeReport(date) {
  if (!confirm(`${date} の確定を解除しますか？\n実績・シフトを再編集できるようになります。\n編集後は再度「日報を確定する」を実行してください（未確定のまま放置すると翌日の自動処理で再確定されます）。`)) return;
  const res = await fetch(`${API}/daily-reports/${date}/unfinalize`,{method:'POST'});
  if (res.ok) {
    showToast('確定を解除しました');
    // 呼び出し元（日報ビュー or 実績入力）に応じて再描画
    if (typeof renderReportPage === 'function' && document.getElementById('content')?.querySelector('.print-header')) {
      renderReportPage();
    } else {
      showPage('actual');
    }
  } else if (res.status === 409) {
    showToast('確定されていません', true);
  } else if (res.status === 404) {
    showToast('対象日が見つかりません', true);
  } else {
    showToast('解除に失敗しました', true);
  }
}

async function updateExpense(date) {
  const expense = parseInt(document.getElementById('adj-expense').value) || 0;
  const r = await fetch(`${API}/daily-reports/${date}`).then(res=>res.json());
  r.expense = expense;
  r.profit  = (r.total_sales||0) - (r.material_cost||0) - (r.labor_cost||0) - expense;
  r.labor_productivity = (r.total_hours>0) ? Math.round(r.total_sales/r.total_hours) : 0;
  await fetch(`${API}/daily-reports/${date}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(r)});
  showToast('経費を更新しました');
  renderReportPage();
}

const MENU_CAT_TO_SUBCAT = {

  '天ぷら':'天ぷら','魚':'魚',

const MAIN_GROUP_BG = '#FFE8D6';
const DOW_LABELS = ['月','火','水','木','金','土'];

async function renderMenuPage() {
  setLoading();
  const mondayStr = getMondayOf(currentDate);
  _menuCurrentMonday = mondayStr;
  const days = getWeekDays(mondayStr);
  const menus = await fetch(`${API}/weekly-menus?week_start=${mondayStr}`).then(r=>r.json()).catch(()=>[]);

  const menuMap = {};
  for(let d=1;d<=6;d++) menuMap[d]={};
  menus.forEach(m=>{ if(!menuMap[m.day_of_week]) menuMap[m.day_of_week]={}; menuMap[m.day_of_week][m.category]=m.menu_name; });

  const hdrCells = ['<div class="wc hdr cat" style="font-size:11px">カテゴリ</div>',
    ...days.map((d,i)=>{
      const dt=new Date(d);
      return `<div class="wc hdr ${i===5?'sat':''}">${(dt.getMonth()+1)}/${dt.getDate()}<br>${DOW_LABELS[i]}</div>`;
    })
  ].join('');

  const souzaiProds = cachedProducts.filter(p=>p.category==='惣菜');
  const allProds    = cachedProducts;
  const allProdOpts = '<option value="">―</option>' + allProds.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');

  // 固定行
  const fixedRows = MENU_CATS.map(cat => {
    const subcat = MENU_CAT_TO_SUBCAT[cat];
    const filtered = Array.isArray(subcat)
      ? souzaiProds.filter(p=>subcat.includes(p.subcategory))
      : subcat ? souzaiProds.filter(p=>p.subcategory===subcat)
      : souzaiProds;
    const removable = REMOVABLE_FIXED_CATS.has(cat);
    const labelText = MENU_CAT_LABEL[cat] || cat;
    const bgStyle = MAIN_GROUP_CATS.has(cat) ? `background:${MAIN_GROUP_BG};` : '';
    const labelCell = removable
      ? `<div class="wc cat" data-extra-row="${cat}" style="${bgStyle}display:flex;align-items:center;justify-content:space-between">
          <span>${labelText}</span>
          <button class="btn btn-secondary btn-sm no-print" style="padding:1px 5px;color:var(--danger)" onclick="removeMenuRow('${cat}')">×</button>
        </div>`
      : `<div class="wc cat" style="${bgStyle}">${labelText}</div>`;
    return [labelCell,
      ...days.map((_,i)=>{
        const dow=i+1;
        const cur = menuMap[dow]?.[cat]||'';
        const opts = '<option value="">―</option>' + filtered.map(p=>`<option value="${p.name}"${p.name===cur?' selected':''}>${p.name}</option>`).join('');
        const dataExtra = removable ? ` data-extra-row="${cat}"` : '';
        return `<div class="wc ${i===5?'sat':''}"${dataExtra}><select data-dow="${dow}" data-cat="${cat}">${opts}</select></div>`;
      })
    ].join('');
  }).join('');

  // 保存済みのおかず行を検出
  const savedExtras = [...new Set(
    menus.filter(m=>!MENU_CATS.includes(m.category)).map(m=>m.category)
  )].sort();
  extraMenuRowCount = savedExtras.reduce((max,cat)=>{
    const n = parseInt(cat.split('_')[1])||0; return Math.max(max,n);
  }, 0);

  const extraRows = savedExtras.map(cat => buildExtraMenuRow(cat, days, menuMap, allProdOpts)).join('');

  const isAdmin = currentRole === 'admin';
  document.getElementById('content').innerHTML = `
    <div class="no-print btn-group mb-16">
      <button class="btn btn-secondary btn-sm" onclick="gotoPrevWeekMenu('${mondayStr}')">◀ 前の週へ</button>

    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">週間献立表</span>
        <button class="btn btn-secondary btn-sm no-print" onclick="addMenuRow()">＋ 行を追加</button>
      </div>
      <div class="card-body" style="padding:8px">
        <div class="week-grid" id="menu-grid" style="grid-template-columns:110px repeat(6,1fr)">
          ${hdrCells}${fixedRows}${extraRows}
        </div>
      </div>
    </div>
  `;
}

function gotoPrevWeekMenu(currentMonday) {
  shiftMenuWeek(currentMonday, -7);
}

function gotoNextWeekMenu(currentMonday) {
  shiftMenuWeek(currentMonday, 7);
}

function shiftMenuWeek(currentMonday, deltaDays) {
  const d = new Date(currentMonday);
  d.setDate(d.getDate() + deltaDays);
  const next = d.toISOString().slice(0, 10);
  currentDate = next;
  document.getElementById('global-date').value = next;
  renderMenuPage();
}

function buildExtraMenuRow(catKey, days, menuMap, allProdOpts) {
  const labelCell = `<div class="wc cat" data-extra-row="${catKey}" style="display:flex;align-items:center;justify-content:space-between">
    <span>おかず</span>
    <button class="btn btn-secondary btn-sm no-print" style="padding:1px 5px;color:var(--danger)" onclick="removeMenuRow('${catKey}')">×</button>
  </div>`;
  const dayCells = days.map((_,i)=>{
    const dow=i+1;
    const cur = menuMap?.[dow]?.[catKey]||'';
    const opts = cachedProducts.length
      ? '<option value="">―</option>' + cachedProducts.map(p=>`<option value="${p.name}"${p.name===cur?' selected':''}>${p.name}</option>`).join('')
      : allProdOpts;
    return `<div class="wc ${i===5?'sat':''}" data-extra-row="${catKey}"><select data-dow="${dow}" data-cat="${catKey}">${opts}</select></div>`;
  }).join('');
  return labelCell + dayCells;
}

function addMenuRow() {
  extraMenuRowCount++;
  const catKey = `おかず_${extraMenuRowCount}`;
  const days = getWeekDays(_menuCurrentMonday);
  const allProdOpts = '<option value="">―</option>' + cachedProducts.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
  const html = buildExtraMenuRow(catKey, days, {}, allProdOpts);
  document.getElementById('menu-grid').insertAdjacentHTML('beforeend', html);
}

function removeMenuRow(catKey) {
  document.querySelectorAll(`[data-extra-row="${catKey}"]`).forEach(el=>el.remove());
}

async function saveMenus(weekStart) {
  const inputs = document.querySelectorAll('.week-grid select');
  const menus = [];
  inputs.forEach(sel=>{ if(sel.value) menus.push({day_of_week:+sel.dataset.dow,category:sel.dataset.cat,menu_name:sel.value}); });
  const r = await fetch(`${API}/weekly-menus`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({week_start:weekStart,menus})}).then(r=>r.json()).catch(()=>null);
  if (r?.ok) showToast('献立を保存しました'); else showToast('保存失敗',true);
}

// 発注数 = 基準数 - 在庫数（0未満は0）。発注数単位があれば一番近い倍数に四捨五入。
// サーバー側 calc_order_qty と同じロジック（保存時はサーバー値が正）。
function calcOrderQty(baseQty, stockQty, orderUnit) {
  const need = (baseQty||0) - (stockQty||0);
  if (need <= 0) return 0;
  const unit = orderUnit||0;
  if (unit > 0) return Math.floor(need/unit + 0.5) * unit;
  return need;
}

        </div>
      </div>`;
    return;
  }

  const catTabs = cats.map(c => `
    <button onclick="selectOrderCategory('${c.replace(/'/g,"\\'")}')"
      class="btn btn-sm ${c===materialOrderState.category?'btn-primary':'btn-secondary'}"
      style="margin:0 6px 6px 0">${c}</button>`).join('');

  document.getElementById('content').innerHTML = `
    <div style="max-width:920px;margin:0 auto">
      <div class="no-print" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
        <button onclick="renderOrderPage()" class="btn btn-secondary btn-sm">← 発注メニュー</button>
        <label style="font-size:13px;color:var(--text2)">対象日</label>
        <input type="date" value="${date}" onchange="currentDate=this.value;renderOrderMaterialPage()"
